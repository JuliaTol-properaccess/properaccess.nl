<!-- Call to actions -->
{{ with site.GetPage "/sections/call-to-action" }}
  {{ if .Params.enable }}
    <section class="mb-28 cta bg-light" id="cta">
      <div class="container">
        <div
          class="bg-light rounded-xl px-4 py-16">
          <div class="row items-center justify-between">
            <div class="md:col-7 md:order-1 mb-10 md:mb-0">
              <img src="{{ "images/julia.webp" | relURL }}" alt="" class="cta-photo" loading="lazy" />
              <h2 class="mb-2">
                {{ .Title | markdownify }}
              </h2>
              <p class="mb-6">
                {{ .Params.description | markdownify }}
              </p>
              {{ with .Params.button }}
                {{ if .enable }}
                  <a class="btn btn-primary" href="{{ .link | absURL }}">
                    {{ .label }}
                  </a>
                {{ end }}
              {{ end }}
            </div>

            <div class="md:col-5 lg:col-4 md:order-2">
              <form
                id="cta-form"
                class="space-y-5"
                novalidate
                onsubmit="event.preventDefault(); paFormSubmit(this, { bron: 'contactformulier', successMessage: 'Bericht verstuurd! We nemen binnen 1 werkdag contact op.' });">
                <input type="text" name="_gotcha" style="display:none" aria-hidden="true" tabindex="-1" />

                <div>
                  <label
                    for="cta-name"
                    class="block mb-2 text-sm font-semibold text-dark">
                    {{ i18n "contact_name" }}
                  </label>
                  <input
                    type="text"
                    id="cta-name"
                    name="naam"
                    autocomplete="name"
                    required
                    class="w-full px-4 py-3 text-dark bg-white border border-border rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all"
                    placeholder="{{ i18n "contact_name_placeholder" }}" />
                </div>

                <div>
                  <label
                    for="cta-email"
                    class="block mb-2 text-sm font-semibold text-dark">
                    {{ i18n "contact_email" }}
                  </label>
                  <input
                    type="email"
                    id="cta-email"
                    name="email"
                    autocomplete="email"
                    required
                    class="w-full px-4 py-3 text-dark bg-white border border-border rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all"
                    placeholder="{{ i18n "contact_email_placeholder" }}" />
                </div>

                <div>
                  <label
                    for="cta-message"
                    class="block mb-2 text-sm font-semibold text-dark">
                    {{ i18n "contact_message" }}
                  </label>
                  <textarea
                    id="cta-message"
                    name="bericht"
                    rows="5"
                    required
                    class="w-full px-4 py-3 text-dark bg-white border border-border rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all resize-none"
                    placeholder="{{ i18n "contact_message_placeholder" }}"></textarea>
                </div>

                <button type="submit" class="btn btn-primary w-full">
                  {{ i18n "contact_submit" }}
                  <i class="fa fa-paper-plane pl-2"></i>
                </button>

                <div role="status" aria-live="polite"></div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </section>
  {{ end }}
{{ end }}
<!-- /Call to actions -->
