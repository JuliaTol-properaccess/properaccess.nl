<!-- cookie consent -->
{{ with site.Params.cookies }}
  {{ if .enable }}
    <div id="cookie-box" class="cookie-box cookie-box-hide">
      <p class="cookie-box-text">{{ .content | markdownify }}</p>
      {{ with .content_detail }}
        <p class="cookie-box-detail">{{ . | markdownify }}</p>
      {{ end }}
      <div class="cookie-box-buttons">
        <button
          id="cookie-accept"
          class="cookie-box-button btn btn-sm btn-primary"
          type="button">
          {{ .button_accept | default "Accepteren" }}
        </button>
        <button
          id="cookie-reject"
          class="cookie-box-button btn btn-sm btn-outline-primary"
          type="button">
          {{ .button_reject | default "Weigeren" }}
        </button>
      </div>
    </div>

    <script type="application/javascript">
      (function() {
        var cookieBox = document.getElementById('cookie-box');
        var acceptBtn = document.getElementById('cookie-accept');
        var rejectBtn = document.getElementById('cookie-reject');
        var consent = Cookies.get('cookie-consent');

        if (!consent) {
          cookieBox.classList.remove('cookie-box-hide');
        }

        acceptBtn.onclick = function () {
          Cookies.set('cookie-consent', 'accepted', { expires: {{ .expire_days }} });
          cookieBox.classList.add('cookie-box-hide');
        };

        rejectBtn.onclick = function () {
          Cookies.set('cookie-consent', 'rejected', { expires: {{ .expire_days }} });
          cookieBox.classList.add('cookie-box-hide');
        };
      })();
    </script>

    <style>
      .cookie-box {
        position: fixed;
        left: 2rem;
        bottom: 2rem;
        z-index: 9999;
        padding: 1.5rem;
        background-color: #fff;
        max-width: calc(100% - 4rem);
        width: 28rem;
        box-shadow: 1px 0px 10px 7px rgba(154, 154, 154, 0.11);
        border-radius: 0.5rem;
      }
      .cookie-box-hide {
        display: none;
      }
      .cookie-box-text {
        margin: 0 0 0.25rem;
        font-size: 0.95rem;
        line-height: 1.5;
      }
      .cookie-box-detail {
        margin: 0 0 0.75rem;
        font-size: 0.8rem;
        color: #6B7280;
        line-height: 1.5;
      }
      .cookie-box-detail a {
        color: #004050;
        text-decoration: underline;
      }
      .cookie-box-buttons {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
      }
      .cookie-box-button {
        margin: 0;
      }
      .dark .cookie-box {
        background-color: #222;
      }
    </style>
  {{ end }}
{{ end }}
