{{ define "main" }}
<section class="section pt-14">
  <div class="container">

    <section class="quiz-section" id="quizSection">
      <div class="quiz__lang-toggle">
        <button type="button" class="quiz__lang-btn" id="quizLangToggle" aria-label="Switch to English">
          <span class="quiz__lang-opt quiz__lang-opt--active" id="quizLangNL">NL</span>
          <span class="quiz__lang-opt" id="quizLangEN">EN</span>
        </button>
      </div>
      <div id="quizContainer"></div>
    </section>

  </div>
</section>
<script src="{{ "js/accessibility-quiz.js" | relURL }}" defer></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    var btn = document.getElementById('quizLangToggle');
    var nlOpt = document.getElementById('quizLangNL');
    var enOpt = document.getElementById('quizLangEN');
    var currentLang = 'nl';
    if (btn) {
      btn.addEventListener('click', function () {
        currentLang = currentLang === 'nl' ? 'en' : 'nl';
        nlOpt.classList.toggle('quiz__lang-opt--active', currentLang === 'nl');
        enOpt.classList.toggle('quiz__lang-opt--active', currentLang === 'en');
        btn.setAttribute('aria-label', currentLang === 'nl' ? 'Switch to English' : 'Schakel naar Nederlands');
        if (window.quizSetLang) window.quizSetLang(currentLang);
      });
    }
  });
</script>
{{ end }}
