{{ $title := .Get "title" }}
{{ $subtitle := .Get "subtitle" }}

<section class="section-steps">
  <div class="container">
    {{ if or $title $subtitle }}
    <div class="section-steps__header">
      {{ with $title }}<h2 class="section-steps__title">{{ . }}</h2>{{ end }}
      {{ with $subtitle }}<p class="section-steps__subtitle">{{ . }}</p>{{ end }}
    </div>
    {{ end }}
    <div class="section-steps__track">
      {{ .Inner }}
    </div>
  </div>
</section>
