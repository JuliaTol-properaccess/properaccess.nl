<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accessibility Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=JetBrains+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,700;9..144,800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c0c0f;--surface:#16161a;--surface-raised:#1e1e24;--surface-hover:#26262e;--border:#2a2a35;--border-light:#3a3a48;--text:#e8e6e3;--text-dim:#9a979f;--text-muted:#6b6874;--accent:#7c6aef;--accent-light:#a08bf8;--accent-glow:rgba(124,106,239,0.15);--correct:#34d399;--correct-bg:rgba(52,211,153,0.08);--correct-border:rgba(52,211,153,0.25);--wrong:#f87171;--wrong-bg:rgba(248,113,113,0.08);--wrong-border:rgba(248,113,113,0.25);--warning:#fbbf24;--radius:12px;--radius-sm:8px;--font:'DM Sans',-apple-system,sans-serif;--mono:'JetBrains Mono',monospace;--display:'Fraunces',serif}
*{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.65;-webkit-font-smoothing:antialiased;min-height:100vh}
.screen{display:none}.screen.active{display:block}

.welcome{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;position:relative;overflow:hidden}
.welcome::before{content:'';position:absolute;top:-300px;left:50%;transform:translateX(-50%);width:800px;height:800px;background:radial-gradient(circle,rgba(124,106,239,0.07) 0%,transparent 70%);pointer-events:none}
.welcome-card{text-align:center;max-width:540px;position:relative}
.welcome-badge{display:inline-block;font-family:var(--mono);font-size:0.7rem;font-weight:500;color:var(--accent-light);background:var(--accent-glow);padding:0.35em 0.9em;border-radius:20px;border:1px solid rgba(124,106,239,0.2);margin-bottom:1.5rem;letter-spacing:0.06em;text-transform:uppercase}
.welcome h1{font-family:var(--display);font-size:clamp(2.2rem,5vw,3.4rem);font-weight:800;letter-spacing:-0.02em;margin-bottom:1rem;background:linear-gradient(135deg,var(--text),var(--accent-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.welcome p{color:var(--text-dim);font-size:1.02rem;margin-bottom:2.5rem;line-height:1.7}
.welcome-stats{display:flex;gap:1.5rem;justify-content:center;margin-bottom:2.5rem;flex-wrap:wrap}
.welcome-stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0.8rem 1.2rem;text-align:center;min-width:100px}
.welcome-stat .num{font-family:var(--display);font-size:1.4rem;font-weight:700;color:var(--accent-light)}
.welcome-stat .label{font-size:0.72rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em}
.start-btn{padding:0.9rem 3rem;background:linear-gradient(135deg,var(--accent),var(--accent-light));color:#fff;border:none;border-radius:var(--radius);font-family:var(--font);font-size:1.05rem;font-weight:700;cursor:pointer;transition:all 0.3s;box-shadow:0 4px 24px rgba(124,106,239,0.3)}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(124,106,239,0.4)}

.top-bar{position:sticky;top:0;z-index:100;background:rgba(12,12,15,0.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0.65rem 1.5rem;display:flex;align-items:center;gap:1rem}
.top-bar-label{font-size:0.78rem;font-weight:600;color:var(--text-muted);white-space:nowrap}
.step-dots{display:flex;gap:4px;flex:1;justify-content:center;flex-wrap:wrap}
.step-dot{width:28px;height:6px;border-radius:3px;background:var(--surface-raised);border:1px solid var(--border);transition:all 0.3s;cursor:pointer}
.step-dot.current{background:var(--accent);border-color:var(--accent);box-shadow:0 0 8px rgba(124,106,239,0.4)}
.step-dot.answered-perfect{background:var(--correct);border-color:var(--correct)}
.step-dot.answered-partial{background:var(--warning);border-color:var(--warning)}
.step-dot.answered-wrong{background:var(--wrong);border-color:var(--wrong)}
.top-bar-counter{font-family:var(--mono);font-size:0.78rem;color:var(--text-dim);white-space:nowrap}

.question-screen{max-width:780px;margin:0 auto;padding:1.5rem 1.5rem 2rem}
.question-header{display:flex;align-items:center;gap:0.75rem;margin-bottom:1.25rem}
.question-number{font-family:var(--mono);font-size:0.82rem;font-weight:500;color:var(--accent-light);background:var(--accent-glow);padding:0.35em 0.85em;border-radius:6px;white-space:nowrap;border:1px solid rgba(124,106,239,0.2)}
.question-scenario{color:var(--text-dim);font-size:0.92rem;margin-bottom:1.5rem;line-height:1.75}

/* DEMO + CODE CONTAINER */
.demo-code-container{margin-bottom:1.5rem;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.demo-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface-raised)}
.demo-tab{padding:0.6rem 1.2rem;font-size:0.78rem;font-weight:600;color:var(--text-muted);cursor:pointer;border:none;background:none;text-transform:uppercase;letter-spacing:0.06em;border-bottom:2px solid transparent;transition:all 0.2s;font-family:var(--font)}
.demo-tab:hover{color:var(--text-dim)}.demo-tab.active{color:var(--accent-light);border-bottom-color:var(--accent)}
.demo-preview{padding:1.75rem;background:#fff;min-height:80px;display:flex;align-items:center;justify-content:center}
.demo-preview *{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.demo-code{display:none;padding:1.25rem 1.5rem;background:#0d0d12;overflow-x:auto}
.demo-code pre{font-family:var(--mono);font-size:0.78rem;line-height:1.85;color:#b4b0c8;margin:0;white-space:pre}

.question-prompt{font-size:0.92rem;font-weight:600;color:var(--text);margin-bottom:0.85rem}
.select-hint{font-size:0.8rem;color:var(--text-muted);font-weight:400;margin-left:0.5rem}
.options-list{display:flex;flex-direction:column;gap:0.5rem;margin-bottom:1.5rem}
.option-btn{display:flex;align-items:flex-start;gap:0.75rem;padding:0.9rem 1rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:all 0.2s;text-align:left;width:100%;font-family:var(--font);font-size:0.9rem;color:var(--text);line-height:1.55}
.option-btn:hover:not(.locked){border-color:var(--border-light);background:var(--surface-hover)}
.option-btn.selected{border-color:var(--accent);background:var(--accent-glow)}
.option-btn.locked{cursor:default}
.option-btn.correct-answer{border-color:var(--correct-border)!important;background:var(--correct-bg)!important}
.option-btn.wrong-answer{border-color:var(--wrong-border)!important;background:var(--wrong-bg)!important}
.option-letter{font-family:var(--mono);font-size:0.75rem;font-weight:600;width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:6px;background:var(--surface-raised);border:1px solid var(--border);color:var(--text-dim);flex-shrink:0;margin-top:1px;transition:all 0.2s}
.option-btn.selected .option-letter{background:var(--accent);border-color:var(--accent);color:#fff}
.option-btn.correct-answer .option-letter{background:var(--correct)!important;border-color:var(--correct)!important;color:#000!important}
.option-btn.wrong-answer .option-letter{background:var(--wrong)!important;border-color:var(--wrong)!important;color:#000!important}
.option-text{flex:1}

.question-actions{display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap}
.btn{padding:0.65rem 1.5rem;border-radius:var(--radius-sm);font-family:var(--font);font-size:0.9rem;font-weight:600;cursor:pointer;transition:all 0.2s;border:none}
.btn-check{background:var(--accent);color:#fff}.btn-check:hover{background:var(--accent-light)}.btn-check:disabled{opacity:0.35;cursor:not-allowed}
.btn-nav{background:var(--surface);color:var(--text);border:1px solid var(--border);display:none}.btn-nav:hover{border-color:var(--border-light);background:var(--surface-hover)}.btn-nav.show{display:inline-flex}
.btn-finish{background:linear-gradient(135deg,var(--accent),var(--accent-light));color:#fff;display:none;box-shadow:0 2px 12px rgba(124,106,239,0.2)}.btn-finish.show{display:inline-flex}
.result-badge{margin-left:auto;font-size:0.82rem;font-weight:600;padding:0.25em 0.75em;border-radius:6px;display:none}
.result-badge.show{display:inline-block}
.result-badge.perfect{background:var(--correct-bg);color:var(--correct);border:1px solid var(--correct-border)}
.result-badge.partial{background:rgba(251,191,36,0.08);color:var(--warning);border:1px solid rgba(251,191,36,0.25)}
.result-badge.wrong{background:var(--wrong-bg);color:var(--wrong);border:1px solid var(--wrong-border)}
.score-detail{font-size:0.78rem;color:var(--text-muted);margin-top:0.3rem}

.explanation{margin-top:1.25rem;padding:1.1rem 1.25rem;border-radius:var(--radius-sm);font-size:0.9rem;color:var(--text-dim);line-height:1.75;display:none;border-left:3px solid var(--accent);background:var(--surface)}
.explanation.show{display:block;animation:fadeIn 0.3s ease}
.explanation strong{color:var(--text)}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.results{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;position:relative}
.results::before{content:'';position:absolute;top:-200px;left:50%;transform:translateX(-50%);width:700px;height:700px;background:radial-gradient(circle,rgba(124,106,239,0.06) 0%,transparent 70%);pointer-events:none}
.results-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:3rem 2.5rem;max-width:480px;width:100%;text-align:center;position:relative;overflow:hidden}
.results-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--correct),var(--accent-light))}
.results-title{font-family:var(--display);font-size:2rem;font-weight:800;margin-bottom:0.4rem}
.results-subtitle{color:var(--text-dim);font-size:0.95rem;margin-bottom:2.5rem}
.score-ring{width:170px;height:170px;margin:0 auto 2rem;position:relative}
.score-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.score-ring-bg{fill:none;stroke:var(--surface-raised);stroke-width:8}
.score-ring-fill{fill:none;stroke:var(--accent);stroke-width:8;stroke-linecap:round;stroke-dasharray:408;stroke-dashoffset:408;transition:stroke-dashoffset 1.5s ease}
.score-ring-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.score-pct{font-family:var(--display);font-size:2.6rem;font-weight:800;color:var(--text);line-height:1}
.score-label{font-size:0.72rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.1em;margin-top:2px}
.results-breakdown{display:flex;justify-content:center;gap:2rem;margin-bottom:2rem}
.breakdown-item{text-align:center}
.breakdown-item .num{font-family:var(--display);font-size:1.5rem;font-weight:700}
.breakdown-item .num.green{color:var(--correct)}.breakdown-item .num.yellow{color:var(--warning)}.breakdown-item .num.red{color:var(--wrong)}
.breakdown-item .label{font-size:0.75rem;color:var(--text-muted)}
.results-actions{display:flex;gap:0.75rem;justify-content:center;flex-wrap:wrap}
.results-actions .btn{padding:0.7rem 1.5rem}
.btn-review{background:var(--accent);color:#fff}.btn-review:hover{background:var(--accent-light)}
.btn-retake{background:none;color:var(--text-dim);border:1px solid var(--border)}.btn-retake:hover{border-color:var(--border-light);color:var(--text)}

.review-screen{max-width:780px;margin:0 auto;padding:2rem 1.5rem 4rem}
.review-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:1rem}
.review-header h2{font-family:var(--display);font-size:1.6rem;font-weight:800}
.review-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:1.25rem;overflow:hidden}
.review-item.perfect{border-color:var(--correct-border)}.review-item.partial{border-color:rgba(251,191,36,0.25)}.review-item.wrong{border-color:var(--wrong-border)}
.review-item-header{display:flex;align-items:center;gap:0.75rem;padding:1rem 1.25rem;background:var(--surface-raised);border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.2s}
.review-item-header:hover{background:var(--surface-hover)}
.review-item-num{font-family:var(--mono);font-size:0.78rem;font-weight:500;color:var(--accent-light);background:var(--accent-glow);padding:0.3em 0.7em;border-radius:5px;border:1px solid rgba(124,106,239,0.2)}
.review-badge{font-size:0.75rem;font-weight:600;padding:0.2em 0.6em;border-radius:5px}
.review-badge.perfect{background:var(--correct-bg);color:var(--correct);border:1px solid var(--correct-border)}
.review-badge.partial{background:rgba(251,191,36,0.08);color:var(--warning);border:1px solid rgba(251,191,36,0.25)}
.review-badge.wrong{background:var(--wrong-bg);color:var(--wrong);border:1px solid var(--wrong-border)}
.review-item-body{padding:1.25rem;display:none}
.review-item.open .review-item-body{display:block}
.review-option{display:flex;align-items:flex-start;gap:0.6rem;padding:0.6rem 0.75rem;border-radius:6px;margin-bottom:0.35rem;font-size:0.88rem;color:var(--text-dim)}
.review-option.was-correct{background:var(--correct-bg);color:var(--text)}
.review-option.was-wrong{background:var(--wrong-bg);color:var(--text)}
.review-option .marker{font-family:var(--mono);font-size:0.72rem;font-weight:600;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:5px;flex-shrink:0;margin-top:1px;background:var(--surface-raised);border:1px solid var(--border);color:var(--text-muted)}
.review-option.was-correct .marker{background:var(--correct);border-color:var(--correct);color:#000}
.review-option.was-wrong .marker{background:var(--wrong);border-color:var(--wrong);color:#000}
.review-explanation{margin-top:0.75rem;padding:0.9rem 1rem;border-radius:var(--radius-sm);font-size:0.88rem;color:var(--text-dim);line-height:1.7;border-left:3px solid var(--accent);background:var(--surface-raised)}
.review-explanation strong{color:var(--text)}
.review-scenario{color:var(--text-dim);font-size:0.88rem;line-height:1.7;margin-bottom:0.75rem;padding-bottom:0.75rem;border-bottom:1px solid var(--border)}
.chevron{color:var(--text-muted);transition:transform 0.2s;font-size:0.8rem}
.review-item.open .chevron{transform:rotate(90deg)}

/* DEMO SPECIFIC */
.dp-card{background:#f8f9fa;border:1px solid #dee2e6;border-radius:8px;padding:16px 20px;cursor:pointer;text-align:left;color:#212529}.dp-card:hover{box-shadow:0 2px 8px rgba(0,0,0,0.1)}.dp-card .n{font-weight:600;font-size:15px}.dp-card .p{color:#495057;font-size:14px;margin-top:4px}
.dp-btn{padding:10px 24px;background:#6366f1;color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer}.dp-btn[aria-disabled="true"]{opacity:0.6}
.dp-tb{display:flex;gap:4px;background:#f1f3f5;padding:6px;border-radius:8px}.dp-tb button{width:16px;height:16px;display:flex;align-items:center;justify-content:center;border:1px solid #ced4da;background:#fff;border-radius:4px;font-size:10px;cursor:pointer;padding:0;line-height:1;color:#333}
.dp-spaced{font-size:18px;color:#212529;font-weight:500}
.dp-form{text-align:left;width:100%;max-width:360px}.dp-form label{display:block;font-size:13px;font-weight:600;margin-bottom:3px;color:#333}.dp-form input,.dp-form select{width:100%;padding:7px 10px;border:1px solid #ced4da;border-radius:4px;font-size:13px;margin-bottom:10px}
.dp-form button{padding:8px 18px;background:#6366f1;color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer;font-weight:600}
.dp-form .hint{font-size:12px;color:#6c757d;margin-top:-7px;margin-bottom:10px}.dp-form .err{font-size:12px;color:#dc3545;margin-top:-7px;margin-bottom:10px}
.dp-form input.inv{border-color:#f87171}
.dp-skip{text-align:left;width:100%;font-size:13px;color:#333}.dp-skip a{color:#6366f1}.dp-skip nav{background:#e9ecef;padding:6px 12px;border-radius:4px;margin-top:6px;font-size:12px}.dp-skip nav a{margin-right:12px}
.dp-skip .main-block{margin-top:8px;padding:8px 12px;background:#e9ecef;border-radius:4px;font-size:12px}
.dp-fs{text-align:left;border:1px solid #dee2e6;border-radius:6px;padding:12px 16px;width:100%;max-width:400px}.dp-fs .lw{margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid #e2e8f0}.dp-fs legend{font-weight:600;font-size:14px;color:#333;padding:0;margin:0}.dp-fs label{display:block;font-size:13px;color:#333;margin:4px 0;cursor:pointer}.dp-fs input[type="radio"]{margin-right:6px}
.dp-logo a{display:flex;align-items:center;text-decoration:none}.dp-logo img{width:64px;height:64px;border-radius:8px;object-fit:cover}
.dp-lr{text-align:left;width:100%;max-width:340px}.dp-lr button{padding:8px 18px;background:#6366f1;color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer;font-weight:600}.dp-lr .msg{margin-top:10px;padding:8px 12px;background:#e8f5e9;border-radius:6px;font-size:13px;color:#2e7d32;font-weight:500;display:none}
.dp-cb{text-align:left;width:100%;max-width:280px}.dp-cb input{width:100%;padding:7px 10px;border:1px solid #ced4da;border-radius:4px;font-size:13px}.dp-cb ul{list-style:none;border:1px solid #dee2e6;border-top:none;border-radius:0 0 4px 4px;margin:0;padding:0}.dp-cb li{padding:6px 10px;font-size:13px;color:#333;cursor:pointer}.dp-cb li.hl{background:#e9ecef}
.dp-disc{text-align:left;width:100%;max-width:420px}.dp-disc details{border:1px solid #dee2e6;border-radius:6px;overflow:hidden}.dp-disc summary{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#f8f9fa;font-size:13px;font-weight:600;cursor:pointer;color:#333}.dp-disc summary button{padding:4px 10px;font-size:11px;background:#6366f1;color:#fff;border:none;border-radius:4px;cursor:pointer}.dp-disc p{padding:10px 14px;font-size:13px;color:#495057}
.dp-vp{background:#1e1e2e;padding:12px 16px;border-radius:6px;font-family:var(--mono);font-size:12px;color:#cdd6f4;text-align:left;width:100%}
.dp-trap{text-align:left;width:100%;max-width:360px;background:#f8f9fa;border:1px solid #dee2e6;border-radius:8px;padding:16px}.dp-trap label{display:block;font-size:13px;font-weight:600;color:#333;margin-bottom:4px}.dp-trap input{width:100%;padding:7px 10px;border:1px solid #ced4da;border-radius:4px;font-size:13px;margin-bottom:8px}.dp-trap button{padding:6px 14px;background:#6366f1;color:#fff;border:none;border-radius:4px;font-size:13px;cursor:pointer}
.dp-dg{display:flex;align-items:center;gap:4px;text-align:left}.dp-dg input{width:42px;padding:6px;text-align:center;border:1px solid #ced4da;border-radius:4px;font-size:13px;color:#333}.dp-dg span{color:#adb5bd}
.dp-steps{text-align:left;width:100%;max-width:420px}.dp-steps .si{padding:8px 12px;margin:4px 0;background:#f8f9fa;border-radius:6px;font-size:13px;color:#333;display:flex;gap:8px}.dp-steps .sn{font-weight:700;color:#6366f1;min-width:20px}

@media(max-width:600px){.welcome{padding:1.5rem}.question-screen{padding:1.25rem 1rem 2rem}.results-card{padding:2rem 1.5rem}.review-screen{padding:1.5rem 1rem 3rem}.step-dots{gap:3px}.step-dot{width:22px;height:5px}.demo-code{padding:0.75rem 1rem}.demo-code pre{font-size:0.72rem}}
</style>
</head>
<body>

<div class="screen active" id="screen-welcome">
<div class="welcome"><div class="welcome-card">
  <h1>Accessibility Quiz</h1>
  <p>20 real-world scenarios testing your WCAG knowledge. Examine each interactive demo and source code, then select all correct statements.</p>
  <div class="welcome-stats">
    <div class="welcome-stat"><div class="num">20</div><div class="label">Questions</div></div>
    <div class="welcome-stat"><div class="num">Multi</div><div class="label">Select</div></div>
    <div class="welcome-stat"><div class="num">~25 min</div><div class="label">Duration</div></div>
  </div>
  <button class="start-btn" onclick="startQuiz()">Start Quiz</button>
</div></div>
</div>

<div class="screen" id="screen-quiz">
<div class="top-bar">
  <span class="top-bar-label">Quiz</span>
  <div class="step-dots" id="stepDots"></div>
  <span class="top-bar-counter" id="topCounter">1 / 20</span>
</div>
<div class="question-screen" id="questionArea"></div>
</div>

<div class="screen" id="screen-results">
<div class="results"><div class="results-card">
  <div class="results-title">Quiz Complete</div>
  <div class="results-subtitle" id="resultsSubtitle"></div>
  <div class="score-ring">
    <svg viewBox="0 0 140 140"><circle class="score-ring-bg" cx="70" cy="70" r="65"/><circle class="score-ring-fill" id="scoreRing" cx="70" cy="70" r="65"/></svg>
    <div class="score-ring-text"><div class="score-pct" id="scorePct">0%</div><div class="score-label">Score</div></div>
  </div>
  <div class="results-breakdown">
    <div class="breakdown-item"><div class="num green" id="perfectCount">0</div><div class="label">Perfect</div></div>
    <div class="breakdown-item"><div class="num yellow" id="partialCount">0</div><div class="label">Partial</div></div>
    <div class="breakdown-item"><div class="num red" id="wrongCount">0</div><div class="label">Incorrect</div></div>
  </div>

<script>
const Q=[
{id:1,
scenario:"A product listing interface contains interactive cards. When a user clicks a card with a mouse, the page navigates to the product detail page.",
demo:'<div class="dp-card" onclick="this.querySelector(\'.n\').style.color=\'#6366f1\'"><div class="n">Wireless headphones</div><div class="p">&euro;120</div></div>',
code:'&lt;div class="product-card" onclick="location.href=\'/product/123\'"&gt;\n  &lt;p&gt;Wireless headphones&lt;/p&gt;\n  &lt;p&gt;€120&lt;/p&gt;\n&lt;/div&gt;',
prompt:"Which statements about this implementation are correct?",
options:[{l:"A",t:"The element is not part of the sequential keyboard navigation order."},{l:"B",t:"Screen reader users may not perceive the card as an interactive element."},{l:"C",t:"Adding role=\"button\" alone would make the component fully accessible."},{l:"D",t:"Replacing the container with an &lt;a&gt; element would provide built-in keyboard activation."},{l:"E",t:"Adding tabindex=\"0\" and handling keyboard events could make the element operable."}],
correct:["A","B","D","E"],
explanation:'A <code>&lt;div&gt;</code> with only <code>onclick</code> is not focusable and has no implicit role. Adding <code>role="button"</code> alone adds semantics but not keyboard operability — you still need <code>tabindex</code> and key handlers. A native <code>&lt;a&gt;</code> provides focus, keyboard activation, and link semantics out of the box.'},

{id:2,
scenario:"A form contains a button that appears visually disabled.",
demo:'<button class="dp-btn" aria-disabled="true" onclick="alert(\'Submitted!\')">Submit</button>',
code:'&lt;button class="submit-btn" aria-disabled="true"&gt;\n  Submit\n&lt;/button&gt;\n\n&lt;script&gt;\ndocument.querySelector(\'.submit-btn\').addEventListener(\'click\', function() {\n  alert("Submitted");\n});\n&lt;/script&gt;',
prompt:"Which statements about this implementation are correct?",
options:[{l:"A",t:"The button remains focusable in the keyboard navigation order."},{l:"B",t:"aria-disabled=\"true\" automatically prevents the click event from firing."},{l:"C",t:"Screen readers may announce that the button is disabled even though it is still operable."},{l:"D",t:"Using the native disabled attribute would prevent interaction by default."},{l:"E",t:"This pattern can create inconsistent behavior between assistive technology and actual functionality."}],
correct:["A","C","D","E"],
explanation:'<code>aria-disabled="true"</code> only communicates state to assistive technology — it does not prevent clicks or keyboard activation. The native <code>disabled</code> attribute both communicates state and prevents interaction.'},

{id:3,
scenario:"A formatting toolbar is implemented with several small icon buttons. Each button is 16 × 16 CSS pixels.",
demo:'<div class="dp-tb"><button type="button" title="Bold">B</button><button type="button" title="Italic"><i>I</i></button><button type="button" title="Underline"><u>U</u></button><button type="button" title="Link">&#128279;</button></div>',
code:'&lt;div class="editor-tools" aria-label="Text formatting"&gt;\n  &lt;button type="button" aria-label="Bold"&gt;B&lt;/button&gt;\n  &lt;button type="button" aria-label="Italic"&gt;I&lt;/button&gt;\n  &lt;button type="button" aria-label="Underline"&gt;U&lt;/button&gt;\n  &lt;button type="button" aria-label="Insert link"&gt;🔗&lt;/button&gt;\n&lt;/div&gt;\n\n&lt;style&gt;\n  .editor-tools {\n    display: flex;\n    gap: 4px;\n  }\n\n  .editor-tools button {\n    width: 16px;\n    height: 16px;\n    padding: 0;\n    border: 1px solid #767676;\n    font-size: 10px;\n    line-height: 1;\n  }\n&lt;/style&gt;',
prompt:"Which accessibility concerns may arise from this implementation?",
options:[{l:"A",t:"The hit area may be too small for many users."},{l:"B",t:"The buttons lack accessible names."},{l:"C",t:"The component may fail touch target size requirements."},{l:"D",t:"The container should use role=\"toolbar\" to expose the widget structure."},{l:"E",t:"Keyboard navigation will not work with these buttons."}],
correct:["A","C"],
explanation:'At 16×16px the buttons fail WCAG 2.5.8 (minimum 24×24px). The buttons have accessible names via <code>aria-label</code> (B is wrong). Native <code>&lt;button&gt;</code> elements are keyboard-operable by default (E is wrong). While <code>role="toolbar"</code> could improve the widget structure, it is not required and the primary concerns here are the target sizes.'},

{id:4,
scenario:"A marketing tagline is styled with extra spacing between letters for visual effect.",
demo:'<div class="dp-spaced">We are B&nbsp;l&nbsp;u&nbsp;e&nbsp;S&nbsp;k&nbsp;y and we build the future</div>',
code:'&lt;p&gt;We are B&amp;nbsp;l&amp;nbsp;u&amp;nbsp;e&amp;nbsp;S&amp;nbsp;k&amp;nbsp;y and we build the future&lt;/p&gt;',
prompt:"Which potential accessibility problems can occur with this implementation?",
options:[{l:"A",t:"Screen readers may announce each letter individually instead of the full word."},{l:"B",t:"The markup may interfere with meaningful text reading order."},{l:"C",t:"The text will not be included in the accessibility tree."},{l:"D",t:"Speech recognition users may have difficulty referencing the word visually shown as \"BlueSky\"."},{l:"E",t:"The spacing technique improves readability for screen reader users."}],
correct:["A","B","D"],
explanation:'Non-breaking spaces between each letter cause screen readers to spell out the word. The fix is CSS <code>letter-spacing</code>. The text is still in the accessibility tree (C is wrong), and this technique harms screen reader readability (E is wrong).'},

{id:5,
scenario:"A form contains several buttons. One of them has an accessibility issue.",
demo:'<div style="text-align:left;width:100%;max-width:360px;"><label for="q5email" style="display:block;font-size:13px;font-weight:600;color:#333;margin-bottom:3px;">Email address</label><input id="q5email" type="email" style="width:100%;padding:7px 10px;border:1px solid #ced4da;border-radius:4px;font-size:13px;margin-bottom:10px;"><div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;"><button class="dp-btn" style="background:#495057" type="button">Previous action</button><button class="dp-btn" type="button" onclick="document.getElementById(\'q5done\').style.display=\'block\'" onfocus="this.blur()">Subscribe</button><button class="dp-btn" style="background:#495057" type="button">Next action</button></div><p id="q5done" style="display:none;font-size:13px;color:#2e7d32;font-weight:600;">Done!</p></div>',
code:'&lt;form id="subscribe-form"&gt;\n  &lt;label for="email"&gt;Email address&lt;/label&gt;\n  &lt;input id="email" type="email"&gt;\n\n  &lt;button type="button"&gt;Previous action&lt;/button&gt;\n\n  &lt;button type="submit" id="subscribe-button"&gt;\n    Subscribe\n  &lt;/button&gt;\n\n  &lt;button type="button"&gt;Next action&lt;/button&gt;\n\n  &lt;p id="result-message" hidden&gt;Done!&lt;/p&gt;\n&lt;/form&gt;\n\n&lt;script&gt;\n  const button = document.getElementById(\'subscribe-button\');\n  const form = document.getElementById(\'subscribe-form\');\n  const result = document.getElementById(\'result-message\');\n\n  button.addEventListener(\'focus\', function () {\n    this.blur();\n  });\n\n  form.addEventListener(\'submit\', function (event) {\n    event.preventDefault();\n    result.hidden = false;\n  });\n&lt;/script&gt;',
prompt:"Which consequences may occur for keyboard users?",
options:[{l:"A",t:"The button cannot receive visible focus."},{l:"B",t:"Users may be unable to activate the control using the keyboard."},{l:"C",t:"This behavior can create a failure of keyboard operability requirements."},{l:"D",t:"Screen readers will automatically ignore the control."},{l:"E",t:"Removing focus programmatically can interfere with predictable focus navigation."}],
correct:["A","B","C","E"],
explanation:'Calling <code>blur()</code> on focus makes the button inoperable via keyboard — users can never land on it to press Enter or Space. Screen readers don\'t automatically ignore it (D is wrong). This violates WCAG 2.1.1 (Keyboard) and 2.4.7 (Focus Visible).'},

{id:6,
scenario:"A page includes a skip link intended to help keyboard users bypass repeated content.",
demo:'<div style="text-align:left;width:100%;font-size:13px;color:#333;"><a href="javascript:void(0)" onclick="var t=document.getElementById(\'q6secnav\');t.style.outline=\'2px solid #6366f1\';t.style.outlineOffset=\'2px\';t.setAttribute(\'tabindex\',\'-1\');t.focus();setTimeout(function(){t.style.outline=\'\';t.style.outlineOffset=\'\'},2000)" style="display:inline-block;margin-bottom:8px;">Skip to main content</a><div style="background:#f1f3f5;padding:8px 12px;border-bottom:1px solid #dee2e6;"><div style="text-align:right;margin-bottom:6px;font-size:12px;"><a href="javascript:void(0)" style="margin-left:12px;">Login</a><a href="javascript:void(0)" style="margin-left:12px;">Support</a></div><nav style="margin-bottom:6px;"><a href="javascript:void(0)" style="margin-right:14px;font-weight:600;">Home</a><a href="javascript:void(0)" style="margin-right:14px;font-weight:600;">Products</a><a href="javascript:void(0)" style="margin-right:14px;font-weight:600;">Services</a><a href="javascript:void(0)" style="font-weight:600;">Contact</a></nav><nav id="q6secnav" style="padding-left:20px;font-size:12px;"><a href="javascript:void(0)" style="margin-right:12px;">Audio</a><a href="javascript:void(0)" style="margin-right:12px;">Video</a><a href="javascript:void(0)">Accessories</a></nav></div><div style="padding:16px 12px;"><h1 style="font-size:18px;margin:0 0 6px;">Wireless Headphones</h1><p style="margin:0 0 8px;color:#495057;">The product details start here.</p><a href="javascript:void(0)">Add to cart</a></div></div>',
code:'&lt;a href="#section-nav" class="skip-link"&gt;Skip to main content&lt;/a&gt;\n\n&lt;header&gt;\n  &lt;div class="top-bar"&gt;\n    &lt;a href="/login"&gt;Login&lt;/a&gt;\n    &lt;a href="/support"&gt;Support&lt;/a&gt;\n  &lt;/div&gt;\n\n  &lt;nav aria-label="Main navigation"&gt;\n    &lt;a href="/"&gt;Home&lt;/a&gt;\n    &lt;a href="/products"&gt;Products&lt;/a&gt;\n    &lt;a href="/services"&gt;Services&lt;/a&gt;\n    &lt;a href="/contact"&gt;Contact&lt;/a&gt;\n  &lt;/nav&gt;\n\n  &lt;nav id="section-nav" aria-label="Section navigation"&gt;\n    &lt;a href="/products/audio"&gt;Audio&lt;/a&gt;\n    &lt;a href="/products/video"&gt;Video&lt;/a&gt;\n    &lt;a href="/products/accessories"&gt;Accessories&lt;/a&gt;\n  &lt;/nav&gt;\n&lt;/header&gt;\n\n&lt;main id="main-content"&gt;\n  &lt;h1&gt;Wireless Headphones&lt;/h1&gt;\n  &lt;p&gt;The product details start here.&lt;/p&gt;\n  &lt;a href="/cart/add/123"&gt;Add to cart&lt;/a&gt;\n&lt;/main&gt;',
prompt:"Which statements are correct?",
options:[{l:"A",t:"The skip link does not take users to the unique main content area."},{l:"B",t:"The skip link still satisfies its purpose because it moves focus to a navigation landmark."},{l:"C",t:"Keyboard users may still need to tab through repeated content after activating it."},{l:"D",t:"The target of the skip link should be the &lt;main&gt; region or an element at the start of the main content."},{l:"E",t:"The presence of multiple &lt;nav&gt; elements automatically makes the skip link unnecessary."}],
correct:["A","C","D"],
explanation:'The skip link says "Skip to main content" but points to <code>#section-nav</code>, still inside the header. Users must still tab through more navigation before reaching actual content. Multiple landmarks do not replace skip links (E is wrong).'},

{id:7,
scenario:"A form contains a selector for delivery options. When the user changes its value, a dialog opens automatically.",
demo:'<div class="dp-form" style="max-width:340px"><label for="q7del">Delivery method</label><select id="q7del" onchange="if(this.value){var d=document.getElementById(\'q7dialog\');d.style.display=\'block\';d.querySelector(\'button\').focus();}"><option value="">Select a delivery method</option><option value="standard">Standard delivery</option><option value="express">Express delivery</option></select><div id="q7dialog" style="display:none;margin-top:10px;padding:14px;background:#f8f9fa;border:2px solid #6366f1;border-radius:8px;"><p style="font-weight:600;font-size:14px;color:#333;margin-bottom:4px;">Additional delivery options</p><p style="font-size:12px;color:#555;margin-bottom:10px;">Extra settings are available for the selected delivery method.</p><button type="button" onclick="document.getElementById(\'q7dialog\').style.display=\'none\';document.getElementById(\'q7del\').value=\'\'" style="padding:6px 14px;background:#6366f1;color:#fff;border:none;border-radius:4px;font-size:12px;cursor:pointer;">Close</button></div></div>',
code:'&lt;form&gt;\n&lt;label for="delivery"&gt;Delivery method&lt;/label&gt;\n&lt;select id="delivery"&gt;\n&lt;option value=""&gt;Select a delivery method&lt;/option&gt;\n&lt;option value="standard"&gt;Standard delivery&lt;/option&gt;\n&lt;option value="express"&gt;Express delivery&lt;/option&gt;\n&lt;/select&gt;\n&lt;/form&gt;\n\n&lt;div id="delivery-dialog" role="dialog" aria-modal="true" aria-labelledby="dialog-title" hidden&gt;\n&lt;h2 id="dialog-title"&gt;Additional delivery options&lt;/h2&gt;\n&lt;p&gt;Extra settings are available for the selected delivery method.&lt;/p&gt;\n&lt;button type="button"&gt;Close&lt;/button&gt;\n&lt;/div&gt;\n\n&lt;script&gt;\nconst deliverySelect = document.getElementById(\'delivery\');\nconst dialog = document.getElementById(\'delivery-dialog\');\n\ndeliverySelect.addEventListener(\'change\', function () {\n  if (this.value) {\n    dialog.hidden = false;\n  }\n});\n&lt;/script&gt;',
prompt:"Which concerns are valid?",
options:[{l:"A",t:"Changing the select value triggers a substantial context change without prior warning."},{l:"B",t:"Opening a dialog after selection can be unexpected for keyboard and screen reader users."},{l:"C",t:"A native &lt;select&gt; cannot be used accessibly if JavaScript listens to change."},{l:"D",t:"This behavior may be acceptable only if users are informed in advance or asked to confirm the action."},{l:"E",t:"The issue exists only when the dialog lacks aria-modal=\"true\"."}],
correct:["A","B","D"],
explanation:'This violates WCAG 3.2.2 (On Input). A <code>&lt;select&gt;</code> with JS is fine in general (C is wrong). The issue is the unexpected context change, not ARIA attributes (E is wrong).'},

{id:8,
scenario:"A phone number field includes visible helper text and an error message after validation.",
demo:'<div class="dp-form"><label for="dp-ph">Phone number</label><input id="dp-ph" type="text"><div class="hint">Format: +31 6 12345678</div><div class="err">This field is required.</div></div>',
code:'&lt;div class="form-field"&gt;\n  &lt;label for="phone"&gt;Phone number&lt;/label&gt;\n  &lt;input id="phone" type="text"&gt;\n  &lt;p id="phone-help"&gt;Format: +31 6 12345678&lt;/p&gt;\n  &lt;p class="error-message"&gt;This field is required.&lt;/p&gt;\n&lt;/div&gt;',
prompt:"Which statements are correct?",
options:[{l:"A",t:"The helper text is visible, but it is not associated with the input programmatically."},{l:"B",t:"The error message should be associated with the input when validation fails."},{l:"C",t:"The field already exposes both descriptions to assistive technologies because they follow the input in the DOM."},{l:"D",t:"aria-describedby can be used to reference helper text and relevant error text."},{l:"E",t:"Placing the error message directly after the input is sufficient for screen readers to announce it automatically."}],
correct:["A","B","D"],
explanation:'DOM proximity does not create programmatic association — screen readers do not automatically announce nearby text just because it follows the input in the source order (C and E are wrong). The fix is <code>aria-describedby</code> referencing both the help and error message IDs.'},

{id:9,
scenario:"A date-of-birth control is split into two &lt;select&gt; elements, preceded by a visible label.",
demo:'<div style="text-align:left;width:100%;max-width:400px;font-size:13px;color:#333;"><form><div><label for="birth-date" style="display:block;font-weight:600;margin-bottom:4px;">Date of birth</label><div style="display:flex;gap:8px;"><select id="birth-date" name="birth-day" style="flex:1;padding:6px 8px;border:1px solid #ced4da;border-radius:4px;font-size:13px;"><option value="">Day</option><option>1</option><option>2</option><option>3</option></select><select id="birth-date" name="birth-month" style="flex:1;padding:6px 8px;border:1px solid #ced4da;border-radius:4px;font-size:13px;"><option value="">Month</option><option>January</option><option>February</option><option>March</option></select></div></div></form></div>',
code:'&lt;form&gt;\n  &lt;div&gt;\n    &lt;label for="birth-date"&gt;Date of birth&lt;/label&gt;\n\n    &lt;select id="birth-date" name="birth-day"&gt;\n      &lt;option value=""&gt;Day&lt;/option&gt;\n      &lt;option&gt;1&lt;/option&gt;\n      &lt;option&gt;2&lt;/option&gt;\n      &lt;option&gt;3&lt;/option&gt;\n    &lt;/select&gt;\n\n    &lt;select id="birth-date" name="birth-month"&gt;\n      &lt;option value=""&gt;Month&lt;/option&gt;\n      &lt;option&gt;January&lt;/option&gt;\n      &lt;option&gt;February&lt;/option&gt;\n      &lt;option&gt;March&lt;/option&gt;\n    &lt;/select&gt;\n  &lt;/div&gt;\n&lt;/form&gt;',
prompt:"Which statements are correct?",
options:[{l:"A",t:"Only the first select is associated with the visible label in this implementation."},{l:"B",t:"Both selects receive the same accessible name because they are grouped visually."},{l:"C",t:"Each form control still needs an accessible name, even when multiple controls form one logical field."},{l:"D",t:"One possible solution is to use a &lt;fieldset&gt; with a &lt;legend&gt; and provide individual labels for each select."},{l:"E",t:"Placeholder texts like first options \"Day\" and \"Month\" are always sufficient as labels."}],
correct:["A","C","D"],
explanation:'The <code>for</code> attribute only links to one element by ID. Visual grouping doesn\'t create programmatic relationships (B is wrong). Placeholder options are not reliable labels (E is wrong).'},

{id:10,
scenario:"A form uses positive tabindex values across contact and address fields.",
demo:'<iframe srcdoc="<!DOCTYPE html><html><head><style>body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:13px;color:#333;margin:12px;} h3{font-size:15px;margin:0 0 10px;} .row{display:flex;align-items:center;margin-bottom:6px;gap:8px;} .row label{min-width:100px;} .row input{flex:1;padding:4px 6px;border:1px solid #333;font-size:13px;} section{margin-bottom:16px;} button{padding:4px 16px;font-size:13px;cursor:pointer;}</style></head><body><form><section><h3>Contact details</h3><div class=row><label>First name</label><input type=text tabindex=1></div><div class=row><label>Last name</label><input type=text tabindex=3></div><div class=row><label>Phone number</label><input type=text tabindex=6></div><div class=row><label>Email address</label><input type=text tabindex=4></div></section><section><h3>Address</h3><div class=row><label>Street</label><input type=text tabindex=4></div><div class=row><label>House number</label><input type=text tabindex=6></div><div class=row><label>Postal code</label><input type=text tabindex=5></div><div class=row><label>City</label><input type=text tabindex=2></div></section><button type=button tabindex=9>Submit</button></form></body></html>" style="width:100%;height:380px;border:none;border-radius:4px;"></iframe>',
code:'&lt;form&gt;\n  &lt;section aria-labelledby="contact-heading"&gt;\n    &lt;h3 id="contact-heading"&gt;Contact details&lt;/h3&gt;\n\n    &lt;div&gt;\n      &lt;label for="firstName"&gt;First name&lt;/label&gt;\n      &lt;input type="text" id="firstName" tabindex="1"&gt;\n    &lt;/div&gt;\n\n    &lt;div&gt;\n      &lt;label for="lastName"&gt;Last name&lt;/label&gt;\n      &lt;input type="text" id="lastName" tabindex="3"&gt;\n    &lt;/div&gt;\n\n    &lt;div&gt;\n      &lt;label for="phone"&gt;Phone number&lt;/label&gt;\n      &lt;input type="tel" id="phone" tabindex="6"&gt;\n    &lt;/div&gt;\n\n    &lt;div&gt;\n      &lt;label for="email"&gt;Email address&lt;/label&gt;\n      &lt;input type="email" id="email" tabindex="4"&gt;\n    &lt;/div&gt;\n  &lt;/section&gt;\n\n  &lt;section aria-labelledby="address-heading"&gt;\n    &lt;h3 id="address-heading"&gt;Address&lt;/h3&gt;\n\n    &lt;div&gt;\n      &lt;label for="street"&gt;Street&lt;/label&gt;\n      &lt;input type="text" id="street" tabindex="4"&gt;\n    &lt;/div&gt;\n\n    &lt;div&gt;\n      &lt;label for="houseNumber"&gt;House number&lt;/label&gt;\n      &lt;input type="text" id="houseNumber" tabindex="6"&gt;\n    &lt;/div&gt;\n\n    &lt;div&gt;\n      &lt;label for="postalCode"&gt;Postal code&lt;/label&gt;\n      &lt;input type="text" id="postalCode" tabindex="5"&gt;\n    &lt;/div&gt;\n\n    &lt;div&gt;\n      &lt;label for="city"&gt;City&lt;/label&gt;\n      &lt;input type="text" id="city" tabindex="2"&gt;\n    &lt;/div&gt;\n  &lt;/section&gt;\n\n  &lt;button type="submit" tabindex="9"&gt;Submit&lt;/button&gt;\n&lt;/form&gt;',
prompt:"Which statements are correct?",
options:[{l:"A",t:"Positive tabindex values can create a focus order that does not follow the visual or logical reading sequence."},{l:"B",t:"Duplicate positive tabindex values may further increase unpredictability."},{l:"C",t:"Using positive tabindex is the recommended way to align focus order with layout."},{l:"D",t:"A better approach is usually to rely on DOM order and use tabindex=\"0\" only when necessary."},{l:"E",t:"This issue affects only screen reader users, not keyboard-only users."}],
correct:["A","B","D"],
explanation:'Positive <code>tabindex</code> creates unpredictable tab sequences for <em>all</em> keyboard users, not just screen reader users (E is wrong). Using positive tabindex is discouraged (C is wrong). Structure the DOM in logical order instead.'},

{id:11,
scenario:"A signup form is submitted with empty fields. Invalid fields are indicated only by a red border added with JavaScript.",
demo:'<div class="dp-form" style="max-width:300px"><label>Full name</label><input class="inv"><label>Email</label><input class="inv"><label>Password</label><input type="password" class="inv"><button style="margin-top:0">Sign up</button></div>',
code:'&lt;form id="signup" novalidate&gt;\n  &lt;div class="form-group"&gt;\n    &lt;label for="name"&gt;Full name&lt;/label&gt;\n    &lt;input type="text" id="name" required&gt;\n  &lt;/div&gt;\n\n  &lt;div class="form-group"&gt;\n    &lt;label for="email"&gt;Email&lt;/label&gt;\n    &lt;input type="email" id="email" required&gt;\n  &lt;/div&gt;\n\n  &lt;div class="form-group"&gt;\n    &lt;label for="password"&gt;Password&lt;/label&gt;\n    &lt;input type="password" id="password" required&gt;\n  &lt;/div&gt;\n\n  &lt;button type="submit"&gt;Sign up&lt;/button&gt;\n&lt;/form&gt;\n\n&lt;style&gt;\n  input.invalid {\n    border: 2px solid #f87171;\n  }\n&lt;/style&gt;\n\n&lt;script&gt;\n  document.getElementById(\'signup\').addEventListener(\'submit\', function (e) {\n    e.preventDefault();\n    this.querySelectorAll(\'input\').forEach(function (input) {\n      if (!input.value.trim()) {\n        input.classList.add(\'invalid\');\n      } else {\n        input.classList.remove(\'invalid\');\n      }\n    });\n  });\n&lt;/script&gt;',
prompt:"Which accessibility problems may arise?",
options:[{l:"A",t:"Error indication relies only on color."},{l:"B",t:"Screen reader users may not be informed that validation errors occurred."},{l:"C",t:"Users may not receive clear, field-specific guidance about how to fix the problem."},{l:"D",t:"Adding a red border automatically exposes the validation state to assistive technologies."},{l:"E",t:"This implementation can create barriers for users with low vision, color vision deficiency, and cognitive disabilities."}],
correct:["A","B","C","E"],
explanation:'A CSS class change is not exposed to assistive technology, so adding a red border does not automatically communicate the validation state (D is wrong). The border color #f87171 has only 2.58:1 contrast ratio against white, failing the 3:1 minimum required by WCAG 1.4.11 for non-text UI components. With no error text and color as the sole indicator, this implementation fails to inform screen reader users, users with low vision or color vision deficiency, and users with cognitive disabilities.'},

{id:12,
scenario:"A group of radio buttons is wrapped in a &lt;fieldset&gt;. The &lt;legend&gt; is present and contains the visible label text.",
demo:'<fieldset style="text-align:left;border:1px solid #cbd5e1;border-radius:8px;padding:16px;max-width:420px;margin:0;"><div style="display:flex;align-items:center;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #e2e8f0;"><legend style="font-weight:600;font-size:1rem;color:#333;padding:0;margin:0;">Shipping method</legend></div><div style="margin-bottom:8px;"><input type="radio" name="q12ship" id="q12std" value="standard" style="margin-right:6px;"><label for="q12std" style="font-size:13px;color:#333;cursor:pointer;">Standard (5–7 days)</label></div><div style="margin-bottom:8px;"><input type="radio" name="q12ship" id="q12exp" value="express" style="margin-right:6px;"><label for="q12exp" style="font-size:13px;color:#333;cursor:pointer;">Express (2–3 days)</label></div><div style="margin-bottom:0;"><input type="radio" name="q12ship" id="q12ovn" value="overnight" style="margin-right:6px;"><label for="q12ovn" style="font-size:13px;color:#333;cursor:pointer;">Overnight</label></div></fieldset>',
code:'&lt;fieldset class="shipping-options"&gt;\n  &lt;div class="legend-wrapper"&gt;\n    &lt;legend&gt;Shipping method&lt;/legend&gt;\n  &lt;/div&gt;\n\n  &lt;div class="option"&gt;\n    &lt;input type="radio" name="shipping" id="standard" value="standard"&gt;\n    &lt;label for="standard"&gt;Standard (5–7 days)&lt;/label&gt;\n  &lt;/div&gt;\n\n  &lt;div class="option"&gt;\n    &lt;input type="radio" name="shipping" id="express" value="express"&gt;\n    &lt;label for="express"&gt;Express (2–3 days)&lt;/label&gt;\n  &lt;/div&gt;\n\n  &lt;div class="option"&gt;\n    &lt;input type="radio" name="shipping" id="overnight" value="overnight"&gt;\n    &lt;label for="overnight"&gt;Overnight&lt;/label&gt;\n  &lt;/div&gt;\n&lt;/fieldset&gt;\n\n&lt;style&gt;\n  .shipping-options {\n    border: 1px solid #cbd5e1;\n    border-radius: 8px;\n    padding: 16px;\n    max-width: 420px;\n  }\n\n  .legend-wrapper {\n    display: flex;\n    align-items: center;\n    margin-bottom: 12px;\n    padding-bottom: 8px;\n    border-bottom: 1px solid #e2e8f0;\n  }\n\n  .legend-wrapper legend {\n    font-weight: 600;\n    font-size: 1rem;\n    padding: 0;\n    margin: 0;\n  }\n\n  .option {\n    margin-bottom: 8px;\n  }\n&lt;/style&gt;',
prompt:"Which statements are correct?",
options:[{l:"A",t:"A &lt;legend&gt; must be a direct child of &lt;fieldset&gt; to provide the group's accessible name reliably."},{l:"B",t:"Wrapping the legend in a &lt;div&gt; can break the semantic relationship between the fieldset and legend."},{l:"C",t:"The radio buttons remain individually labelable, but the group label may be lost."},{l:"D",t:"Screen readers will always infer the legend text from the visual layout."},{l:"E",t:"The correct fix is to replace &lt;fieldset&gt; with a &lt;div role=\"radiogroup\"&gt; in all cases."}],
correct:["A","B","C"],
explanation:'Per the HTML spec, <code>&lt;legend&gt;</code> must be the first element child of <code>&lt;fieldset&gt;</code>. Wrapping it in a <code>&lt;div&gt;</code> breaks the association. Screen readers do not infer from visual layout (D is wrong). <code>&lt;fieldset&gt;</code>/<code>&lt;legend&gt;</code> is the preferred native pattern (E is wrong).'},

{id:13,
scenario:'The logo with text "Good" is present on a page. This logo functions as a link. The accessible name of this link is "homepage".',
demo:'<div style="display:flex;align-items:center;"><a href="javascript:void(0)" aria-label="Go to homepage" aria-labelledby="q13logo-description" style="display:flex;align-items:center;text-decoration:none;"><img src="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%27120%27 height=%2764%27 viewBox=%270 0 120 64%27%3E%3Crect width=%27120%27 height=%2764%27 rx=%278%27 fill=%27%23e9ecef%27/%3E%3Ctext x=%2760%27 y=%2738%27 text-anchor=%27middle%27 font-family=%27Arial,sans-serif%27 font-weight=%27700%27 font-size=%2724%27 fill=%27%23333%27%3EGood%3C/text%3E%3C/svg%3E" alt="Good Corporation" style="height:64px;border-radius:8px;"><span id="q13logo-description" style="position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0">homepage</span></a></div>',
code:'&lt;a href="/" aria-label="Go to homepage" aria-labelledby="logo-description"&gt;\n  &lt;img src="https://static.vecteezy.com/system/resources/previews/021/396/902/large_2x/good-logo-icon-vector.jpg" alt="Good Corporation"&gt;\n  &lt;span id="logo-description" style="position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0"&gt;homepage&lt;/span&gt;\n&lt;/a&gt;',
prompt:"Which concerns are valid?",
options:[{l:"A",t:"The accessible name does not match the visible label users see on screen."},{l:"B",t:"Speech-input users may have difficulty activating the link using the visible text."},{l:"C",t:"The purpose of the link is less clear than it could be."},{l:"D",t:"This is acceptable because aria-labelledby always improves link clarity."},{l:"E",t:"A better accessible name would usually include the visible name and, if needed, the destination or purpose."}],
correct:["A","B","C","E"],
explanation:'<code>aria-labelledby</code> wins the accessible name computation, so the link is announced as "homepage." The visible "Good" is not in the accessible name, violating WCAG 2.5.3 (Label in Name). <code>aria-labelledby</code> doesn\'t automatically improve clarity (D is wrong).'},

{id:14,
scenario:'After a user activates a "Calculate" button, a result message appears. This is a status message.',
demo:'<div class="dp-lr"><button onclick="var m=this.parentNode.querySelector(\'.msg\');m.style.display=\'block\';m.textContent=\'The cost is €300\'">Calculate</button><div class="msg"></div></div>',
code:'&lt;div id="result" aria-live="polite" hidden&gt;Taking into account the selected parameters, the cost is&lt;/div&gt;',
prompt:"Which statements are correct?",
options:[{l:"A",t:"Content inside an element with the hidden attribute is not exposed, so live region announcements may not occur."},{l:"B",t:"Merely updating a hidden live region is not a reliable way to announce a status message."},{l:"C",t:"Keyboard focus must always move to the message for it to be accessible."},{l:"D",t:"The live region should generally be present and exposed before its text content changes."},{l:"E",t:"This kind of update may need a properly implemented status message pattern rather than focus movement."}],
correct:["A","B","D","E"],
explanation:'The <code>hidden</code> attribute removes the element from the accessibility tree. When JS removes <code>hidden</code> and injects text simultaneously, screen readers won\'t announce the change. The live region must exist and be visible to AT <em>before</em> the content update. Focus movement is not always required (C is wrong).'},

{id:15,
scenario:'A custom autocomplete widget places role="combobox" on a wrapper &lt;div&gt; that contains an &lt;input&gt;.',
demo:'<div style="text-align:left;width:100%;max-width:300px;"><label id="q15search-label" for="q15input" style="display:block;font-size:13px;font-weight:600;color:#333;margin-bottom:4px;">Search country</label><div role="combobox" aria-expanded="false" aria-haspopup="listbox" aria-controls="q15list" aria-labelledby="q15search-label" style="display:flex;gap:0;"><input id="q15input" type="text" autocomplete="off" placeholder="Type a country" oninput="var ul=document.getElementById(\'q15list\');var v=this.value.toLowerCase();var items=ul.querySelectorAll(\'li\');var any=false;items.forEach(function(li){var match=li.textContent.toLowerCase().indexOf(v)>=0;li.style.display=match?\'block\':\'none\';if(match)any=true;});ul.style.display=any&&v?\'block\':\'none\';this.parentNode.setAttribute(\'aria-expanded\',any&&v?\'true\':\'false\');" onfocus="var ul=document.getElementById(\'q15list\');if(this.value){ul.style.display=\'block\';this.parentNode.setAttribute(\'aria-expanded\',\'true\');}" style="flex:1;padding:7px 10px;border:1px solid #ced4da;border-radius:4px 0 0 4px;font-size:13px;"><button type="button" aria-label="Show suggestions" onclick="var ul=document.getElementById(\'q15list\');var show=ul.style.display!==\'block\';ul.style.display=show?\'block\':\'none\';ul.querySelectorAll(\'li\').forEach(function(li){li.style.display=\'block\';});ul.parentNode.querySelector(\'[role=combobox]\').setAttribute(\'aria-expanded\',show?\'true\':\'false\');" style="padding:7px 10px;border:1px solid #ced4da;border-left:none;border-radius:0 4px 4px 0;background:#f8f9fa;cursor:pointer;font-size:13px;color:#333;">▼</button></div><ul id="q15list" role="listbox" aria-label="Country suggestions" style="display:none;list-style:none;border:1px solid #dee2e6;border-top:none;border-radius:0 0 4px 4px;margin:0;padding:0;"><li role="option" onclick="document.getElementById(\'q15input\').value=this.textContent;document.getElementById(\'q15list\').style.display=\'none\';" style="padding:6px 10px;font-size:13px;color:#333;cursor:pointer;">Netherlands</li><li role="option" onclick="document.getElementById(\'q15input\').value=this.textContent;document.getElementById(\'q15list\').style.display=\'none\';" style="padding:6px 10px;font-size:13px;color:#333;cursor:pointer;">Norway</li><li role="option" onclick="document.getElementById(\'q15input\').value=this.textContent;document.getElementById(\'q15list\').style.display=\'none\';" style="padding:6px 10px;font-size:13px;color:#333;cursor:pointer;">Nigeria</li></ul></div>',
code:'&lt;label id="search-label" for="search-input"&gt;Search country&lt;/label&gt;\n\n&lt;div\n  class="search-combobox"\n  role="combobox"\n  aria-expanded="false"\n  aria-haspopup="listbox"\n  aria-controls="search-suggestions"\n  aria-labelledby="search-label"\n&gt;\n  &lt;input\n    id="search-input"\n    type="text"\n    autocomplete="off"\n    placeholder="Type a country"\n  &gt;\n  &lt;button type="button" aria-label="Show suggestions"&gt;▼&lt;/button&gt;\n&lt;/div&gt;\n\n&lt;ul id="search-suggestions" role="listbox" aria-label="Country suggestions" hidden&gt;\n  &lt;li role="option"&gt;Netherlands&lt;/li&gt;\n  &lt;li role="option"&gt;Norway&lt;/li&gt;\n  &lt;li role="option"&gt;Nigeria&lt;/li&gt;\n&lt;/ul&gt;',
prompt:"Which statements are correct?",
options:[{l:"A",t:"Exposing the combobox role on a wrapper instead of the actual editable control can create conflicting semantics."},{l:"B",t:"Assistive technologies may not correctly interpret which element is the text entry field."},{l:"C",t:"The input should typically be the combobox element in editable combobox patterns."},{l:"D",t:"The presence of an &lt;input&gt; inside a role=\"combobox\" container automatically resolves all semantics."},{l:"E",t:"ARIA combobox implementations must follow the expected ownership and focus model carefully."}],
correct:["A","B","C"],
explanation:'In ARIA 1.2, <code>role="combobox"</code> should be on the <code>&lt;input&gt;</code> itself. Placing it on a wrapper <code>&lt;div&gt;</code> creates conflicting semantics and confusion about which element is the editable control. Nesting an input inside a combobox container doesn\'t automatically resolve this (D is wrong). While E is a generally true statement, it does not identify a specific problem in this implementation.'},

{id:16,
scenario:'A disclosure component uses native &lt;details&gt; and &lt;summary&gt;, but also places a button inside &lt;summary&gt;.',
demo:'<div class="dp-disc"><details><summary>What is your return policy?<button type="button" onclick="event.stopPropagation();alert(\'Contact support\')">Contact support</button></summary><p>Items can be returned within 30 days of purchase.</p></details></div>',
code:'&lt;section&gt;\n  &lt;h2&gt;Frequently asked questions&lt;/h2&gt;\n\n  &lt;details class="faq-item"&gt;\n    &lt;summary&gt;\n      What is your return policy?\n      &lt;button type="button"&gt;Contact support&lt;/button&gt;\n    &lt;/summary&gt;\n\n    &lt;p&gt;\n      Items can be returned within 30 days of purchase.\n    &lt;/p&gt;\n  &lt;/details&gt;\n&lt;/section&gt;',
prompt:"Which statements are correct?",
options:[{l:"A",t:"&lt;summary&gt; already acts as the interactive control for the disclosure."},{l:"B",t:"Putting another interactive element inside &lt;summary&gt; can create nested interactive controls."},{l:"C",t:"This may cause inconsistent behavior for keyboard and assistive technology users."},{l:"D",t:"Adding role=\"button\" to the inner button resolves the issue."},{l:"E",t:"The extra control should usually be moved outside the &lt;summary&gt; element."}],
correct:["A","B","C","E"],
explanation:'<code>&lt;summary&gt;</code> is inherently interactive. Nesting a <code>&lt;button&gt;</code> inside creates an interactive-inside-interactive violation. <code>role="button"</code> doesn\'t fix the structural nesting problem (D is wrong).'},

{id:17,
scenario:"The page includes a &lt;meta name=\"viewport\"&gt; element with the following content attribute:",
demo:'',
code:'&lt;!doctype html&gt;\n&lt;html lang="en"&gt;\n&lt;head&gt;\n  &lt;meta charset="utf-8"&gt;\n  &lt;title&gt;Checkout&lt;/title&gt;\n  &lt;meta\n    name="viewport"\n    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"\n  &gt;\n&lt;/head&gt;\n&lt;body&gt;\n  &lt;main&gt;\n    &lt;h1&gt;Checkout&lt;/h1&gt;\n\n    &lt;form&gt;\n      &lt;div&gt;\n        &lt;label for="cardNumber"&gt;Card number&lt;/label&gt;\n        &lt;input id="cardNumber" type="text"&gt;\n      &lt;/div&gt;\n\n      &lt;div&gt;\n        &lt;label for="expiry"&gt;Expiry date&lt;/label&gt;\n        &lt;input id="expiry" type="text"&gt;\n      &lt;/div&gt;\n\n      &lt;button type="submit"&gt;Pay now&lt;/button&gt;\n    &lt;/form&gt;\n  &lt;/main&gt;\n&lt;/body&gt;\n&lt;/html&gt;',
prompt:"Which statements are correct?",
options:[{l:"A",t:"Restricting user zoom can prevent people from scaling content as needed."},{l:"B",t:"This can create barriers for users with low vision."},{l:"C",t:"Preventing zoom is acceptable when the layout is responsive."},{l:"D",t:"Users should generally be allowed to zoom to at least 200%."},{l:"E",t:"This issue is caused by CSS, not by the viewport configuration."}],
correct:["A","B","D"],
explanation:'<code>maximum-scale=1</code> and <code>user-scalable=no</code> prevent pinch-to-zoom, violating WCAG 1.4.4. A responsive layout does not replace zoom (C is wrong). This is a viewport meta issue, not CSS (E is wrong).'},

{id:18,
scenario:'Activating the "Open filters" button opens the panel with filters and the keyboard focus is placed in the input field.',
demo:'<iframe srcdoc="<!DOCTYPE html><html><head><style>body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:13px;color:#333;margin:12px;}a{color:#6366f1;margin-right:12px;}button{padding:6px 14px;font-size:13px;cursor:pointer;}#fp{margin-top:12px;padding:14px;background:#f8f9fa;border:1px solid #dee2e6;border-radius:8px;}#fp h2{font-size:15px;margin:0 0 10px;}#fp label{display:block;font-size:13px;font-weight:600;margin-bottom:4px;}#fp input{width:100%;padding:7px 10px;border:1px solid #ced4da;border-radius:4px;font-size:13px;margin-bottom:8px;box-sizing:border-box;}</style></head><body><a href=javascript:void(0)>Home</a> <button id=ob onclick=document.getElementById(this.dataset.t).hidden=false;document.getElementById(this.dataset.k).focus() data-t=fp data-k=kw>Open filters</button> <a href=javascript:void(0)>Contact</a><div id=fp hidden><h2>Filters</h2><label for=kw>Keyword</label><input id=kw type=text onkeydown=if(event.key===String.fromCharCode(84)+String.fromCharCode(97)+String.fromCharCode(98)){event.preventDefault();this.focus();}><button type=button onclick=void(0) onkeydown=if(event.key===String.fromCharCode(84)+String.fromCharCode(97)+String.fromCharCode(98)){event.preventDefault();document.getElementById(String.fromCharCode(107)+String.fromCharCode(119)).focus()}>Apply</button></div></body></html>" style="width:100%;height:220px;border:none;border-radius:4px;"></iframe>',
code:'&lt;!doctype html&gt;\n&lt;html lang="en"&gt;\n&lt;head&gt;\n  &lt;meta charset="utf-8"&gt;\n  &lt;title&gt;Keyboard trap example&lt;/title&gt;\n&lt;/head&gt;\n&lt;body&gt;\n  &lt;a href="/home"&gt;Home&lt;/a&gt;\n  &lt;button id="openPanel"&gt;Open filters&lt;/button&gt;\n  &lt;a href="/contact"&gt;Contact&lt;/a&gt;\n\n  &lt;div id="filterPanel" hidden&gt;\n    &lt;h2&gt;Filters&lt;/h2&gt;\n\n    &lt;label for="keyword"&gt;Keyword&lt;/label&gt;\n    &lt;input id="keyword" type="text"&gt;\n\n    &lt;button type="button"&gt;Apply&lt;/button&gt;\n  &lt;/div&gt;\n\n  &lt;script&gt;\n    const openPanel = document.getElementById(\'openPanel\');\n    const panel = document.getElementById(\'filterPanel\');\n    const keyword = document.getElementById(\'keyword\');\n\n    openPanel.addEventListener(\'click\', () =&gt; {\n      panel.hidden = false;\n      keyword.focus();\n    });\n\n    panel.addEventListener(\'keydown\', (event) =&gt; {\n      if (event.key === \'Tab\') {\n        event.preventDefault();\n        keyword.focus();\n      }\n    });\n  &lt;/script&gt;\n&lt;/body&gt;\n&lt;/html&gt;',
prompt:"Which consequences may arise from this implementation?",
options:[{l:"A",t:"Keyboard users can become trapped inside the component."},{l:"B",t:"Users may be unable to leave the component using standard keyboard interaction."},{l:"C",t:"This pattern can be acceptable only when a correct modal dialog focus trap is intentionally implemented."},{l:"D",t:"Preventing Tab is always required for any custom panel."},{l:"E",t:"This behavior can fail keyboard accessibility requirements."}],
correct:["A","B","C","E"],
explanation:'This is a serious WCAG 2.1.2 (No Keyboard Trap) violation unless it\'s a modal dialog with Escape exit. A regular filter panel should never trap focus (D is wrong).'},

{id:19,
scenario:"A booking form splits the date into three text fields.",
demo:'<div class="dp-form" style="max-width:400px"><label for="dp-nm">Full name</label><input id="dp-nm" type="text"><div class="dp-dg"><input placeholder="DD"><span>/</span><input placeholder="MM"><span>/</span><input placeholder="YY"></div><div style="height:10px"></div><button>Continue</button></div>',
code:'&lt;form&gt;\n  &lt;h2&gt;Book an appointment&lt;/h2&gt;\n\n  &lt;div&gt;\n    &lt;label for="name"&gt;Full name&lt;/label&gt;\n    &lt;input id="name" type="text"&gt;\n  &lt;/div&gt;\n\n  &lt;div class="date-group"&gt;\n    &lt;input type="text" size="2" maxlength="2" placeholder="DD"&gt;\n    /\n    &lt;input type="text" size="2" maxlength="2" placeholder="MM"&gt;\n    /\n    &lt;input type="text" size="2" maxlength="2" placeholder="YY"&gt;\n  &lt;/div&gt;\n\n  &lt;button type="submit"&gt;Continue&lt;/button&gt;\n&lt;/form&gt;',
prompt:"Which concerns are valid?",
options:[{l:"A",t:"The date inputs lack a clear visible label describing what the grouped fields represent."},{l:"B",t:"Placeholder text such as \"DD\", \"MM\", and \"YY\" is sufficient as labeling and instruction by itself."},{l:"C",t:"Users may not understand the expected format or purpose of the group."},{l:"D",t:"A visible group label and explicit format instructions would improve accessibility."},{l:"E",t:"The problem affects only screen reader users."}],
correct:["A","C","D"],
explanation:'Placeholder text disappears on input and isn\'t a reliable label (B is wrong). <em>All</em> users may struggle without a visible label — not just screen reader users (E is wrong).'},

{id:20,
scenario:"A set of step-by-step instructions is presented visually in the correct order using CSS order, but the DOM order is different.",
demo:'<div class="dp-steps"><div class="si"><span class="sn">1.</span> Read the safety instructions provided with the seat.</div><div class="si"><span class="sn">2.</span> Adjust the harness to fit the child properly.</div><div class="si"><span class="sn">3.</span> Place the car seat on the vehicle seat.</div><div class="si"><span class="sn">4.</span> Secure the seat using the seat belt or ISOFIX anchors.</div><div class="si"><span class="sn">5.</span> Check that the seat does not move more than 2 cm.</div></div>',
code:'&lt;section class="instructions"&gt;\n  &lt;h2&gt;Install a child car seat&lt;/h2&gt;\n\n  &lt;div class="steps"&gt;\n    &lt;div class="step step-3"&gt;Place the car seat on the vehicle seat.&lt;/div&gt;\n    &lt;div class="step step-5"&gt;Check that the seat does not move more than 2 cm.&lt;/div&gt;\n    &lt;div class="step step-1"&gt;Read the safety instructions provided with the seat.&lt;/div&gt;\n    &lt;div class="step step-4"&gt;Secure the seat using the seat belt or ISOFIX anchors.&lt;/div&gt;\n    &lt;div class="step step-2"&gt;Adjust the harness to fit the child properly.&lt;/div&gt;\n  &lt;/div&gt;\n&lt;/section&gt;\n\n&lt;style&gt;\n  .steps {\n    display: flex;\n    flex-direction: column;\n  }\n\n  .step {\n    position: relative;\n    padding-left: 1.2rem;\n    margin-bottom: 0.5rem;\n  }\n\n  .step::before {\n    content: "•";\n    position: absolute;\n    left: 0;\n  }\n\n  .step-1 { order: 1; }\n  .step-2 { order: 2; }\n  .step-3 { order: 3; }\n  .step-4 { order: 4; }\n  .step-5 { order: 5; }\n&lt;/style&gt;',
prompt:"Which statements are correct?",
options:[{l:"A",t:"Assistive technologies typically follow DOM order, not the visual order created by CSS."},{l:"B",t:"Users may perceive the steps in a different sequence depending on how they access the content."},{l:"C",t:"CSS order changes the semantic reading order for all users equally."},{l:"D",t:"Sequential instructions should be authored in the correct DOM order."},{l:"E",t:"This kind of content should generally use list semantics rather than generic &lt;div&gt; elements."}],
correct:["A","B","D","E"],
explanation:'CSS <code>order</code> only changes visual layout — the accessibility tree follows the DOM. Screen readers will read the scrambled DOM order (3, 5, 1, 4, 2), which for safety instructions could be dangerous. Use an <code>&lt;ol&gt;</code> in the correct DOM order.'}
];

let cur=0;const st={};Q.forEach(q=>{st[q.id]={sel:[],done:false,res:null,pts:0}});

function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById('screen-'+id).classList.add('active');window.scrollTo(0,0)}
function startQuiz(){cur=0;buildDots();render();show('quiz')}
function buildDots(){const w=document.getElementById('stepDots');w.innerHTML='';Q.forEach((_,i)=>{const d=document.createElement('div');d.className='step-dot'+(i===0?' current':'');d.title='Question '+(i+1);d.onclick=()=>{if(st[Q[i].id].done||i===cur)goTo(i)};w.appendChild(d)})}
function updateDots(){document.querySelectorAll('.step-dot').forEach((d,i)=>{d.className='step-dot';const s=st[Q[i].id];if(i===cur)d.classList.add('current');if(s.res==='perfect')d.classList.add('answered-perfect');else if(s.res==='partial')d.classList.add('answered-partial');else if(s.res==='wrong')d.classList.add('answered-wrong')});document.getElementById('topCounter').textContent=(cur+1)+' / '+Q.length}

function render(){
const q=Q[cur],s=st[q.id],isLast=cur===Q.length-1,allDone=Object.values(st).every(x=>x.done);
const a=document.getElementById('questionArea');
const nc=q.correct.length;
a.innerHTML=`
<div class="question-header"><span class="question-number">Question ${q.id} of ${Q.length}</span></div>
<div class="question-scenario">${q.scenario}</div>
<div class="demo-code-container">
  ${q.demo?`<div class="demo-tabs"><button class="demo-tab active" onclick="swTab(this,'preview')">Preview</button><button class="demo-tab" onclick="swTab(this,'code')">Source Code</button></div>
  <div class="demo-preview" id="dP">${q.demo}</div>
  <div class="demo-code" id="dC"><pre>${q.code}</pre></div>`:`<div class="demo-tabs"><button class="demo-tab active">Source Code</button></div><div class="demo-code" id="dC" style="display:block"><pre>${q.code}</pre></div>`}
</div>
<div class="question-prompt">${q.prompt}</div>
<div class="options-list" id="oL">${q.options.map(o=>{let c='option-btn';if(s.done){c+=' locked';if(q.correct.includes(o.l))c+=' correct-answer';if(s.sel.includes(o.l)&&!q.correct.includes(o.l))c+=' wrong-answer'}else if(s.sel.includes(o.l))c+=' selected';return`<button class="${c}" data-l="${o.l}" onclick="tog(this,'${o.l}')"><span class="option-letter">${o.l}</span><span class="option-text">${o.t}</span></button>`}).join('')}</div>
<div class="question-actions">
  ${!s.done?`<button class="btn btn-check" id="ckBtn" onclick="check()" ${s.sel.length===0?'disabled':''}>Check Answer</button>`:''}
  ${s.done&&!isLast?`<button class="btn btn-nav show" onclick="goNext()">Next Question →</button>`:''}
  ${s.done&&isLast?`<button class="btn btn-finish show" onclick="finish()">See Results</button>`:''}
  ${s.done&&!isLast&&allDone?`<button class="btn btn-finish show" onclick="finish()">See Results</button>`:''}
  ${cur>0?`<button class="btn btn-nav show" onclick="goPrev()">← Previous</button>`:''}
  <span class="result-badge ${s.done?'show '+s.res:''}">${s.res==='perfect'?'Perfect':s.res==='partial'?'Partial':s.res==='wrong'?'Incorrect':''}</span>
</div>
${s.done?`<div class="score-detail">You got ${[...new Set(s.sel)].filter(x=>q.correct.includes(x)).length} of ${nc} correct${s.sel.filter(x=>!q.correct.includes(x)).length>0?', with '+s.sel.filter(x=>!q.correct.includes(x)).length+' wrong selection'+(s.sel.filter(x=>!q.correct.includes(x)).length>1?'s':''):''}.</div>`:''}
<div class="explanation ${s.done?'show':''}">${q.explanation}</div>`;
updateDots()}

function swTab(b,t){b.parentNode.querySelectorAll('.demo-tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.getElementById('dP').style.display=t==='preview'?'flex':'none';document.getElementById('dC').style.display=t==='code'?'block':'none'}
function tog(b,l){const q=Q[cur],s=st[q.id];if(s.done)return;if(s.sel.includes(l)){s.sel=s.sel.filter(x=>x!==l);b.classList.remove('selected')}else{s.sel.push(l);b.classList.add('selected')}const c=document.getElementById('ckBtn');if(c)c.disabled=s.sel.length===0}

function check(){const q=Q[cur],s=st[q.id];s.done=true;
const cs=new Set(q.correct),ss=new Set(s.sel);
const hits=[...ss].filter(x=>cs.has(x)).length;
const misses=[...ss].filter(x=>!cs.has(x)).length;
s.pts=Math.max(0,hits-misses);
if(s.pts===cs.size&&misses===0)s.res='perfect';
else if(s.pts>0)s.res='partial';
else s.res='wrong';
render()}

function goNext(){if(cur<Q.length-1){cur++;render();window.scrollTo(0,0)}}
function goPrev(){if(cur>0){cur--;render();window.scrollTo(0,0)}}
function goTo(i){cur=i;render();window.scrollTo(0,0)}

function finish(){let tp=0,mx=0,p=0,pa=0,w=0;
Q.forEach(q=>{const s=st[q.id];mx+=q.correct.length;if(!s.done){w++;s.res='wrong';return}tp+=s.pts;if(s.res==='perfect')p++;else if(s.res==='partial')pa++;else w++});
const sc=Math.round((tp/mx)*100);
document.getElementById('perfectCount').textContent=p;
document.getElementById('partialCount').textContent=pa;
document.getElementById('wrongCount').textContent=w;
document.getElementById('scorePct').textContent=sc+'%';
const r=document.getElementById('scoreRing'),circ=2*Math.PI*65,off=circ-(sc/100)*circ;
if(sc>=80){r.style.stroke='var(--correct)';document.getElementById('resultsSubtitle').textContent='Excellent! You have strong WCAG knowledge.'}
else if(sc>=50){r.style.stroke='var(--warning)';document.getElementById('resultsSubtitle').textContent='Good foundation, but some areas need attention.'}
else{r.style.stroke='var(--wrong)';document.getElementById('resultsSubtitle').textContent='Consider reviewing WCAG guidelines more thoroughly.'}
show('results');setTimeout(()=>{r.style.strokeDashoffset=off},200)}

function showReview(){const list=document.getElementById('reviewList');list.innerHTML='';
Q.forEach(q=>{const s=st[q.id];const it=document.createElement('div');it.className='review-item '+(s.res||'wrong');
it.innerHTML=`<div class="review-item-header" onclick="this.parentNode.classList.toggle('open')"><span class="review-item-num">Q${q.id}</span><span class="review-badge ${s.res||'wrong'}">${s.res==='perfect'?'Perfect':s.res==='partial'?'Partial':'Incorrect'}</span><span class="chevron">▶</span></div>
<div class="review-item-body"><div class="review-scenario">${q.scenario}</div>${q.options.map(o=>{const ic=q.correct.includes(o.l),ws=s.sel.includes(o.l);let c='review-option';if(ic)c+=' was-correct';else if(ws)c+=' was-wrong';return`<div class="${c}"><span class="marker">${ic?'✓':ws?'✗':o.l}</span><span>${o.t}</span></div>`}).join('')}<div class="review-explanation">${q.explanation}</div></div>`;
list.appendChild(it)});show('review')}

function resetQuiz(){cur=0;Q.forEach(q=>{st[q.id]={sel:[],done:false,res:null,pts:0}});document.getElementById('scoreRing').style.strokeDashoffset=408;buildDots();render();show('quiz')}
</script>
</body>
</html>
