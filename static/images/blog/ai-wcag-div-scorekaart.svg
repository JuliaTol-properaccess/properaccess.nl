  <text x="66" y="208" fill="#1F2937" font-family="Nunito Sans, sans-serif" font-size="9.5" font-weight="700">Live: addEventListener</text>
  <text x="66" y="222" fill="#6B7280" font-family="Nunito, sans-serif" font-size="8">Onzichtbaar in DOM, alleen heuristieken</text>
