  <text x="66" y="152" fill="#1F2937" font-family="Nunito Sans, sans-serif" font-size="9.5" font-weight="700">Live: inline onclick</text>
  <text x="66" y="166" fill="#6B7280" font-family="Nunito, sans-serif" font-size="8">Playwright doorzoekt DOM op attributen</text>
  <rect x="300" y="146" width="56" height="20" rx="10" fill="#004050" opacity="0.12"/>
