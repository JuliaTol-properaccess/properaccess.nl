  <line x1="24" y1="64" x2="368" y2="64" stroke="#f3f4f6" stroke-width="1"/>

  <!-- Row 1: Code-analyse -->
  <rect x="24" y="80" width="344" height="44" rx="8" fill="#f0fdf4"/>
