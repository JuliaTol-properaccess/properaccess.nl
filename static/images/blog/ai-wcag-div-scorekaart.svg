  <!-- Row 3: addEventListener (missed) -->
  <rect x="24" y="192" width="344" height="44" rx="8" fill="#fdf2f8"/>
  <circle cx="48" cy="214" r="10" fill="#A30D4B" opacity="0.15"/>
