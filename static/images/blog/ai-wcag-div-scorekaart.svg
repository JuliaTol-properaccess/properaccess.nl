  <text x="42" y="274" fill="#004050" font-family="Nunito Sans, sans-serif" font-size="11" font-weight="700">&#x2713;</text>
  <text x="66" y="264" fill="#1F2937" font-family="Nunito Sans, sans-serif" font-size="9.5" font-weight="700">Dynamisch geladen divs</text>
