<svg viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Achtergrond -->
  <rect width="1200" height="630" fill="#f9fafb"/>

  <!-- Subtiele grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e5e7eb" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.5"/>

  <!-- Decoratieve cirkels achtergrond -->
  <circle cx="900" cy="150" r="180" fill="#A30D4B" opacity="0.03"/>
  <circle cx="300" cy="480" r="140" fill="#004050" opacity="0.03"/>
  <circle cx="600" cy="315" r="220" fill="#1F2937" opacity="0.02"/>

  <!-- Robot/AI icoon links -->
  <g transform="translate(340, 200)">
    <!-- Hoofd -->
    <rect x="0" y="30" width="100" height="80" rx="16" fill="none" stroke="#9ca3af" stroke-width="2"/>
    <!-- Ogen -->
    <circle cx="35" cy="65" r="10" fill="none" stroke="#9ca3af" stroke-width="2"/>
    <circle cx="35" cy="65" r="4" fill="#9ca3af"/>
    <circle cx="65" cy="65" r="10" fill="none" stroke="#9ca3af" stroke-width="2"/>
    <circle cx="65" cy="65" r="4" fill="#9ca3af"/>
    <!-- Antenne -->
    <line x1="50" y1="30" x2="50" y2="10" stroke="#9ca3af" stroke-width="2"/>
    <circle cx="50" cy="8" r="5" fill="none" stroke="#9ca3af" stroke-width="2"/>
    <!-- Mond -->
    <line x1="30" y1="90" x2="70" y2="90" stroke="#9ca3af" stroke-width="2" stroke-linecap="round"/>
    <!-- Lichaam -->
    <rect x="15" y="118" width="70" height="50" rx="10" fill="none" stroke="#9ca3af" stroke-width="2"/>
    <!-- Armen -->
    <line x1="15" y1="135" x2="-10" y2="150" stroke="#9ca3af" stroke-width="2" stroke-linecap="round"/>
    <line x1="85" y1="135" x2="110" y2="150" stroke="#9ca3af" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Verbindingslijnen -->
  <g stroke="#d1d5db" stroke-width="1.5" stroke-dasharray="6 4">
    <line x1="480" y1="290" x2="530" y2="290"/>
    <line x1="530" y1="290" x2="530" y2="260"/>
    <line x1="530" y1="290" x2="530" y2="320"/>
    <line x1="530" y1="290" x2="560" y2="290"/>
    <line x1="530" y1="260" x2="560" y2="260"/>
    <line x1="530" y1="320" x2="560" y2="320"/>
  </g>

  <!-- Code/WCAG blokken rechts -->
  <g transform="translate(560, 230)">
    <!-- Blok 1 -->
    <rect x="0" y="0" width="260" height="36" rx="6" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1"/>
    <text x="14" y="23" font-family="monospace" font-size="13" fill="#6b7280">&lt;button role="button"&gt;</text>
    <rect x="220" y="8" width="28" height="20" rx="4" fill="#A30D4B" opacity="0.12"/>
    <text x="227" y="23" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#A30D4B">AA</text>

    <!-- Blok 2 -->
    <rect x="0" y="48" width="260" height="36" rx="6" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1"/>
    <text x="14" y="71" font-family="monospace" font-size="13" fill="#6b7280">&lt;img alt="..."&gt;</text>
    <rect x="220" y="56" width="28" height="20" rx="4" fill="#004050" opacity="0.12"/>
    <text x="227" y="71" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#004050">AA</text>

    <!-- Blok 3 -->
    <rect x="0" y="96" width="260" height="36" rx="6" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1"/>
    <text x="14" y="119" font-family="monospace" font-size="13" fill="#6b7280">contrast: 4.6:1</text>
    <rect x="220" y="104" width="28" height="20" rx="4" fill="#A30D4B" opacity="0.12"/>
    <text x="227" y="119" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#A30D4B">AA</text>
  </g>

  <!-- Serie label onderaan -->
  <text x="600" y="520" text-anchor="middle" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="14" font-weight="600" fill="#9ca3af" letter-spacing="0.1em">SERIE: AI EN TOEGANKELIJKHEIDSTESTEN</text>

  <!-- Subtiele lijn -->
  <line x1="420" y1="535" x2="780" y2="535" stroke="#e5e7eb" stroke-width="1"/>
</svg>
