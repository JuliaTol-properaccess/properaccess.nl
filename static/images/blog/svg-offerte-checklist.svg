<svg viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect x="4" y="4" width="392" height="392" rx="12" fill="#e5e7eb"/>
  <rect x="0" y="0" width="392" height="392" rx="12" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Header -->
  <text x="24" y="34" fill="#1F2937" font-family="Nunito Sans, sans-serif" font-size="13" font-weight="700">Offertes vergelijken</text>
  <text x="24" y="50" fill="#9ca3af" font-family="Nunito, sans-serif" font-size="9">Waar je op moet letten</text>
  <line x1="24" y1="62" x2="368" y2="62" stroke="#f3f4f6" stroke-width="1"/>

  <!-- Item 1: WCAG-EM -->
  <rect x="24" y="74" width="344" height="52" rx="8" fill="#f9fafb"/>
  <circle cx="48" cy="100" r="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <path d="M43 100 l3 3 7-7" stroke="#22c55e" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="68" y="95" fill="#1F2937" font-family="Nunito Sans, sans-serif" font-size="10" font-weight="700">WCAG-EM methodiek</text>
  <text x="68" y="109" fill="#6B7280" font-family="Nunito, sans-serif" font-size="8">Internationaal erkende methode voor steekproef en rapportage</text>

  <!-- Item 2: Per element -->
  <rect x="24" y="136" width="344" height="52" rx="8" fill="#f9fafb"/>
  <circle cx="48" cy="162" r="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <path d="M43 162 l3 3 7-7" stroke="#22c55e" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="68" y="157" fill="#1F2937" font-family="Nunito Sans, sans-serif" font-size="10" font-weight="700">Rapport per element</text>
  <text x="68" y="171" fill="#6B7280" font-family="Nunito, sans-serif" font-size="8">Je developer ziet precies wat er moet veranderen, op welke pagina</text>

  <!-- Item 3: Senior auditor -->
  <rect x="24" y="198" width="344" height="52" rx="8" fill="#f9fafb"/>
  <circle cx="48" cy="224" r="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <path d="M43 224 l3 3 7-7" stroke="#22c55e" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="68" y="219" fill="#1F2937" font-family="Nunito Sans, sans-serif" font-size="10" font-weight="700">Senior auditor</text>
  <text x="68" y="233" fill="#6B7280" font-family="Nunito, sans-serif" font-size="8">Direct contact met de onderzoeker, geen tussenpersonen</text>

  <!-- Item 4: Handmatig testen -->
  <rect x="24" y="260" width="344" height="52" rx="8" fill="#f9fafb"/>
  <circle cx="48" cy="286" r="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <path d="M43 286 l3 3 7-7" stroke="#22c55e" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="68" y="281" fill="#1F2937" font-family="Nunito Sans, sans-serif" font-size="10" font-weight="700">Handmatig testen</text>
  <text x="68" y="295" fill="#6B7280" font-family="Nunito, sans-serif" font-size="8">Automatische tools vinden maximaal 30% van alle problemen</text>

  <!-- Item 5: Onafhankelijk -->
  <rect x="24" y="322" width="344" height="52" rx="8" fill="#f9fafb"/>
  <circle cx="48" cy="348" r="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <path d="M43 348 l3 3 7-7" stroke="#22c55e" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="68" y="343" fill="#1F2937" font-family="Nunito Sans, sans-serif" font-size="10" font-weight="700">Onafhankelijk bureau</text>
  <text x="68" y="357" fill="#6B7280" font-family="Nunito, sans-serif" font-size="8">Geen websitebouw of -beheer, geen belangenconflict</text>
</svg>
