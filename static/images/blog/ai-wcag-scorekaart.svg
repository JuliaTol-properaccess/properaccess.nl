<svg viewBox="0 0 400 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background card -->
  <rect x="4" y="4" width="392" height="352" rx="12" fill="#e5e7eb"/>
  <rect x="0" y="0" width="392" height="352" rx="12" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Header -->
  <text x="24" y="36" fill="#1F2937" font-family="Nunito Sans, sans-serif" font-size="14" font-weight="700">Scorekaart</text>
  <text x="24" y="52" fill="#9ca3af" font-family="Nunito, sans-serif" font-size="9">Zo beoordelen we elke AI-test</text>
  <line x1="24" y1="64" x2="368" y2="64" stroke="#f3f4f6" stroke-width="1"/>

  <!-- Score 1: Gevonden -->
  <rect x="24" y="80" width="160" height="100" rx="10" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="24" y="80" width="160" height="6" rx="3" fill="#004050"/>
  <circle cx="52" cy="118" r="16" fill="#004050" opacity="0.12"/>
  <text x="44" y="123" fill="#004050" font-family="Nunito Sans, sans-serif" font-size="16" font-weight="700">&#x2713;</text>
  <text x="76" y="114" fill="#1F2937" font-family="Nunito Sans, sans-serif" font-size="11" font-weight="700">Gevonden</text>
  <text x="76" y="128" fill="#6B7280" font-family="Nunito, sans-serif" font-size="8">AI detecteert het</text>
  <text x="76" y="140" fill="#6B7280" font-family="Nunito, sans-serif" font-size="8">probleem correct</text>

  <!-- Score 2: Gemist -->
  <rect x="208" y="80" width="160" height="100" rx="10" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="208" y="80" width="160" height="6" rx="3" fill="#A30D4B"/>
  <circle cx="236" cy="118" r="16" fill="#A30D4B" opacity="0.12"/>
  <text x="230" y="123" fill="#A30D4B" font-family="Nunito Sans, sans-serif" font-size="16" font-weight="700">&#x2717;</text>
  <text x="260" y="114" fill="#1F2937" font-family="Nunito Sans, sans-serif" font-size="11" font-weight="700">Gemist</text>
  <text x="260" y="128" fill="#6B7280" font-family="Nunito, sans-serif" font-size="8">AI detecteert het</text>
  <text x="260" y="140" fill="#6B7280" font-family="Nunito, sans-serif" font-size="8">probleem niet</text>

  <!-- Score 3: Vals alarm -->
  <rect x="24" y="200" width="160" height="100" rx="10" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="24" y="200" width="160" height="6" rx="3" fill="#D97706"/>
  <circle cx="52" cy="238" r="16" fill="#D97706" opacity="0.12"/>
  <text x="46" y="243" fill="#D97706" font-family="Nunito Sans, sans-serif" font-size="16" font-weight="700">!</text>
  <text x="76" y="234" fill="#1F2937" font-family="Nunito Sans, sans-serif" font-size="11" font-weight="700">Vals alarm</text>
  <text x="76" y="248" fill="#6B7280" font-family="Nunito, sans-serif" font-size="8">AI meldt een probleem</text>
  <text x="76" y="260" fill="#6B7280" font-family="Nunito, sans-serif" font-size="8">dat er niet is</text>

  <!-- Score 4: Gedeeltelijk -->
  <rect x="208" y="200" width="160" height="100" rx="10" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="208" y="200" width="160" height="6" rx="3" fill="#004050" opacity="0.5"/>
  <circle cx="236" cy="238" r="16" fill="#004050" opacity="0.12"/>
  <text x="229" y="243" fill="#004050" font-family="Nunito Sans, sans-serif" font-size="16" font-weight="700">~</text>
  <text x="260" y="234" fill="#1F2937" font-family="Nunito Sans, sans-serif" font-size="11" font-weight="700">Gedeeltelijk</text>
  <text x="260" y="248" fill="#6B7280" font-family="Nunito, sans-serif" font-size="8">AI detecteert het, maar</text>
  <text x="260" y="260" fill="#6B7280" font-family="Nunito, sans-serif" font-size="8">mist de kern</text>

  <!-- Footer -->
  <text x="24" y="336" fill="#9ca3af" font-family="Nunito, sans-serif" font-size="8">Serie AI en Toegankelijkheidstesten | Proper Access 2026</text>
</svg>
