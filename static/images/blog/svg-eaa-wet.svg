<svg viewBox="0 0 400 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Document shadow -->
  <rect x="54" y="24" width="300" height="320" rx="10" fill="#e5e7eb"/>
  <!-- Document -->
  <rect x="50" y="20" width="300" height="320" rx="10" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Header bar -->
  <rect x="50" y="20" width="300" height="50" rx="10" fill="#1F2937"/>
  <rect x="50" y="50" width="300" height="20" fill="#1F2937"/>

  <!-- EU stars (simplified circle) -->
  <circle cx="82" cy="45" r="16" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
  <circle cx="82" cy="29" r="2" fill="#f59e0b"/>
  <circle cx="95" cy="33" r="2" fill="#f59e0b"/>
  <circle cx="69" cy="33" r="2" fill="#f59e0b"/>
  <circle cx="98" cy="45" r="2" fill="#f59e0b"/>
  <circle cx="66" cy="45" r="2" fill="#f59e0b"/>
  <circle cx="95" cy="57" r="2" fill="#f59e0b"/>
  <circle cx="69" cy="57" r="2" fill="#f59e0b"/>
  <circle cx="82" cy="61" r="2" fill="#f59e0b"/>

  <text x="110" y="40" fill="#9ca3af" font-family="Nunito Sans, sans-serif" font-size="8" font-weight="700" letter-spacing="1">EUROPEAN ACCESSIBILITY ACT</text>
  <text x="110" y="56" fill="#fff" font-family="Nunito Sans, sans-serif" font-size="12" font-weight="700">Verplichtingen webshops</text>

  <!-- WCAG badge -->
  <rect x="260" y="82" width="72" height="24" rx="12" fill="#A30D4B"/>
  <text x="272" y="98" fill="#fff" font-family="Nunito Sans, sans-serif" font-size="9" font-weight="700">WCAG 2.2</text>

  <!-- Content lines -->
  <text x="70" y="96" fill="#1F2937" font-family="Nunito Sans, sans-serif" font-size="10" font-weight="700">Norm</text>
  <text x="70" y="112" fill="#6B7280" font-family="Nunito, sans-serif" font-size="9">WCAG 2.1 AA (wij adviseren 2.2)</text>
  <line x1="70" y1="122" x2="330" y2="122" stroke="#f3f4f6" stroke-width="1"/>

  <text x="70" y="142" fill="#1F2937" font-family="Nunito Sans, sans-serif" font-size="10" font-weight="700">Van kracht sinds</text>
  <text x="70" y="158" fill="#6B7280" font-family="Nunito, sans-serif" font-size="9">28 juni 2025</text>
  <line x1="70" y1="168" x2="330" y2="168" stroke="#f3f4f6" stroke-width="1"/>

  <text x="70" y="188" fill="#1F2937" font-family="Nunito Sans, sans-serif" font-size="10" font-weight="700">Geldt voor</text>
  <!-- Chips -->
  <rect x="70" y="196" width="70" height="20" rx="10" fill="#f3f4f6"/>
  <text x="82" y="210" fill="#1F2937" font-family="Nunito, sans-serif" font-size="8" font-weight="600">Webshops</text>
  <rect x="148" y="196" width="80" height="20" rx="10" fill="#f3f4f6"/>
  <text x="160" y="210" fill="#1F2937" font-family="Nunito, sans-serif" font-size="8" font-weight="600">Ticketverkoop</text>
  <rect x="236" y="196" width="80" height="20" rx="10" fill="#f3f4f6"/>
  <text x="248" y="210" fill="#1F2937" font-family="Nunito, sans-serif" font-size="8" font-weight="600">Boekingsites</text>
  <rect x="70" y="222" width="88" height="20" rx="10" fill="#f3f4f6"/>
  <text x="82" y="236" fill="#1F2937" font-family="Nunito, sans-serif" font-size="8" font-weight="600">Abonnementen</text>
  <rect x="166" y="222" width="80" height="20" rx="10" fill="#f3f4f6"/>
  <text x="178" y="236" fill="#1F2937" font-family="Nunito, sans-serif" font-size="8" font-weight="600">Marktplaatsen</text>

  <line x1="70" y1="252" x2="330" y2="252" stroke="#f3f4f6" stroke-width="1"/>

  <!-- Uitzondering -->
  <text x="70" y="272" fill="#1F2937" font-family="Nunito Sans, sans-serif" font-size="10" font-weight="700">Uitzondering</text>
  <text x="70" y="288" fill="#6B7280" font-family="Nunito, sans-serif" font-size="9">Micro-ondernemingen (&lt;10 fte, &lt;2M omzet)</text>

  <!-- Toezicht -->
  <line x1="70" y1="300" x2="330" y2="300" stroke="#f3f4f6" stroke-width="1"/>
  <text x="70" y="320" fill="#1F2937" font-family="Nunito Sans, sans-serif" font-size="10" font-weight="700">Toezicht</text>
  <text x="70" y="336" fill="#6B7280" font-family="Nunito, sans-serif" font-size="9">AFM (e-commerce)</text>
