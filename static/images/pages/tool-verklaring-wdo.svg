<svg viewBox="0 0 400 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background card -->
  <rect x="40" y="20" width="320" height="320" rx="16" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Header bar -->
  <rect x="40" y="20" width="320" height="52" rx="16" fill="#1F2937"/>
  <rect x="40" y="56" width="320" height="16" fill="#1F2937"/>
  <text x="64" y="52" fill="#fff" font-family="Nunito Sans, sans-serif" font-size="13" font-weight="700">Toegankelijkheidsverklaring</text>
  <rect x="280" y="36" width="56" height="24" rx="12" fill="#A30D4B"/>
  <text x="295" y="52" fill="#fff" font-family="Nunito Sans, sans-serif" font-size="10" font-weight="700">B</text>

  <!-- Status indicator -->
  <rect x="64" y="88" width="120" height="8" rx="4" fill="#e5e7eb"/>
  <rect x="64" y="88" width="78" height="8" rx="4" fill="#A30D4B"/>
  <text x="192" y="96" fill="#6B7280" font-family="Nunito, sans-serif" font-size="9">Gedeeltelijk</text>

  <!-- Checklist items -->
  <!-- Item 1: checked -->
  <rect x="64" y="116" width="272" height="44" rx="8" fill="#f0fdf4" stroke="#dcfce7" stroke-width="1"/>
  <circle cx="88" cy="138" r="12" fill="#16a34a"/>
  <path d="M82 138 l4 4 8-8" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="108" y="134" fill="#1F2937" font-family="Nunito Sans, sans-serif" font-size="10" font-weight="700">Verklaring gepubliceerd</text>
  <text x="108" y="148" fill="#6B7280" font-family="Nunito, sans-serif" font-size="8">Status B — voldoet gedeeltelijk</text>

  <!-- Item 2: checked -->
  <rect x="64" y="168" width="272" height="44" rx="8" fill="#f0fdf4" stroke="#dcfce7" stroke-width="1"/>
  <circle cx="88" cy="190" r="12" fill="#16a34a"/>
  <path d="M82 190 l4 4 8-8" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="108" y="186" fill="#1F2937" font-family="Nunito Sans, sans-serif" font-size="10" font-weight="700">Maatregelen benoemd</text>
  <text x="108" y="200" fill="#6B7280" font-family="Nunito, sans-serif" font-size="8">Audit gepland, streefdatum vastgelegd</text>

  <!-- Item 3: in progress -->
  <rect x="64" y="220" width="272" height="44" rx="8" fill="#eff6ff" stroke="#dbeafe" stroke-width="1"/>
  <circle cx="88" cy="242" r="12" fill="#fff" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="88" cy="242" r="4" fill="#3b82f6"/>
  <text x="108" y="238" fill="#1F2937" font-family="Nunito Sans, sans-serif" font-size="10" font-weight="700">Voortgang aantoonbaar</text>
  <text x="108" y="252" fill="#6B7280" font-family="Nunito, sans-serif" font-size="8">Verbeteringen in uitvoering</text>

  <!-- Bottom action -->
  <rect x="64" y="284" width="160" height="36" rx="8" fill="#A30D4B"/>
  <text x="88" y="306" fill="#fff" font-family="Nunito Sans, sans-serif" font-size="11" font-weight="700">Verklaring opstellen</text>

  <!-- Decorative: small floating badge -->
  <rect x="280" y="280" width="56" height="40" rx="8" fill="#1F2937"/>
  <text x="290" y="296" fill="#9ca3af" font-family="monospace" font-size="7">5 min</text>
  <text x="290" y="310" fill="#22c55e" font-family="monospace" font-size="8">gratis</text>
</svg>
