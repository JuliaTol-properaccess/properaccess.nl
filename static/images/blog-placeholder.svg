<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" fill="none">
  <rect width="800" height="420" fill="#f9fafb"/>
  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#A30D4B" opacity="0.08"/>
  </pattern>
  <rect width="800" height="420" fill="url(#grid)"/>
  <!-- Logo mark -->
  <circle cx="400" cy="180" r="36" fill="#A30D4B" opacity="0.1"/>
  <text x="400" y="188" text-anchor="middle" font-family="Nunito Sans, sans-serif" font-size="28" font-weight="900" fill="#A30D4B" opacity="0.6">PA</text>
  <!-- Tagline -->
  <text x="400" y="240" text-anchor="middle" font-family="Nunito, sans-serif" font-size="14" font-weight="600" fill="#9ca3af">Proper Access</text>
</svg>
