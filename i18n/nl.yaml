- id: tools_promo_title
  translation: "Proper Access Toolsuite"
- id: tools_promo_text1
  translation: "Wij hebben een applicatie ontwikkeld met 9 tools waarmee webredactie zelfstandig de toegankelijkheid van content kan controleren. Geen technische kennis nodig, geen HTML-kennis vereist."
- id: tools_promo_text2
  translation: "De tools signaleren niet alleen problemen, maar leggen ook uit waarom iets een probleem is en hoe je het kan oplossen. Zo leer je tijdens het controleren ook hoe je toegankelijke content maakt."
- id: tools_promo_text3
  translation: "De toolsuite bevat checkers voor koppenstructuur, alt-teksten, links, tabellen, semantiek, foutmeldingen, iframes, taal en paginatitels."
