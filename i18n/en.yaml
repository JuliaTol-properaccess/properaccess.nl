tools_promo_title: "Proper Access Toolsuite"
tools_promo_text1: "We built an application with 9 tools that allow web editors to independently check their content for accessibility. No technical knowledge needed, no HTML required."
tools_promo_text2: "The tools don't just flag issues — they also explain why something is a problem and how to fix it. So you learn while you check."
tools_promo_text3: "The toolsuite includes checkers for heading structure, alt texts, links, tables, semantics, error messages, iframes, language and page titles."
